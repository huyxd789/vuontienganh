/* ================================================================
   VƯỜN TỪ — LÕI THUẬT TOÁN
   FSRS-lite · bộ chọn bài thích ứng · bộ sinh ô chữ
   ================================================================ */

/* ---------- Cấp độ ---------- */
const LEVELS = [
  { id: 1, name: "Mầm",  cefr: "Pre-A1", age: "4–7 tuổi",     color: "#2BB673", desc: "Nghe · Phát âm · Từ vựng",  skills: ["listen","speak","vocab"] },
  { id: 2, name: "Chồi", cefr: "A1",     age: "Tiểu học",     color: "#3FA7D6", desc: "Nghe · Phát âm · Từ vựng",  skills: ["listen","speak","vocab"] },
  { id: 3, name: "Lá",   cefr: "A2",     age: "THCS trở lên", color: "#F5A623", desc: "+ Ngữ pháp · Đọc hiểu",     skills: ["listen","speak","vocab","grammar","read"] },
  { id: 4, name: "Hoa",  cefr: "B1",     age: "Người đi làm", color: "#E8506E", desc: "+ Ngữ pháp · Đọc hiểu",     skills: ["listen","speak","vocab","grammar","read"] },
  { id: 5, name: "Quả",  cefr: "B2",     age: "Nâng cao",     color: "#8B5CF6", desc: "+ Ngữ pháp · Đọc hiểu",     skills: ["listen","speak","vocab","grammar","read"] },
];
const lvl = (id) => LEVELS.find((l) => l.id === id);

/* ---------- FSRS-lite ----------
   R(t) = (1 + F·t/S)^(-0.5)   — đường quên lũy thừa (FSRS-5)
   S = độ bền trí nhớ (ngày), D = độ khó (1–10)
------------------------------------------------ */
const F_ = 19 / 81, DECAY = -0.5, DAY = 86400000;
const W = { S0a: 0.4, S0g: 3.0, D0a: 7.2, D0g: 5.0, dUp: 0.9, dDn: 0.35, sInc: 2.6, sHard: 0.06, sBonus: 1.6, sFail: 1.5, sPow: 0.35 };
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const emptyMem = () => ({ S: 0, D: 5, last: 0, reps: 0, lapses: 0 });

function retrievability(m, now) {
  if (!m || m.reps === 0) return 0;
  const t = Math.max(0, (now - m.last) / DAY);
  return Math.pow(1 + (F_ * t) / Math.max(m.S, 0.05), DECAY);
}
function review(m, ok, now) {
  if (!m || m.reps === 0)
    return { S: ok ? W.S0g : W.S0a, D: clamp(ok ? W.D0g : W.D0a, 1, 10), last: now, reps: 1, lapses: ok ? 0 : 1 };
  const R0 = retrievability(m, now);
  const D = clamp(ok ? m.D - W.dDn : m.D + W.dUp, 1, 10);
  let S;
  if (ok) {
    const gain = 1 + W.sInc * (11 - D) * W.sHard * (Math.exp(W.sBonus * (1 - R0)) - 1) * Math.pow(m.S, -0.15);
    S = m.S * Math.max(1.05, gain);
  } else {
    S = W.sFail * Math.pow(D, -0.3) * Math.pow(m.S + 1, W.sPow) * Math.exp(0.5 * (1 - R0));
    S = Math.max(0.15, Math.min(S, m.S));
  }
  return { S: clamp(S, 0.1, 3650), D, last: now, reps: m.reps + 1, lapses: m.lapses + (ok ? 0 : 1) };
}
const nextInterval = (S, target = 0.9) => (S / F_) * (Math.pow(target, 1 / DECAY) - 1);

/* ---------- Đóng gói item học ---------- */
const ITEMS = [];
TOPICS.forEach((t) =>
  t.words.forEach(([en, vi], i) =>
    ITEMS.push({ id: "w" + t.id + "-" + i, kind: "word", en, vi, emoji: t.emoji, topic: t.id, level: t.level })
  )
);
GRAMMAR.forEach((g) => ITEMS.push(Object.assign({}, g, { topic: null, emoji: "📐" })));
READINGS.forEach((r, i) =>
  r.qs.forEach((q, j) =>
    ITEMS.push({ id: "r" + i + "-" + j, kind: "read", passage: r, q: q.q, opts: q.opts, a: q.a, topic: r.topicId, level: r.level, emoji: "📖" })
  )
);
const ITEM_BY_ID = {};
ITEMS.forEach((i) => (ITEM_BY_ID[i.id] = i));
const TOPIC_BY_ID = {};
TOPICS.forEach((t) => (TOPIC_BY_ID[t.id] = t));

const shuffle = (a) => { const x = a.slice(); for (let i = x.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); const s = x[i]; x[i] = x[j]; x[j] = s; } return x; };

/* ---------- Bộ chọn bài thích ứng ----------
   Ưu tiên item mới, rồi item có R gần ngưỡng 0.85 (vùng phát triển gần)
------------------------------------------------ */
const TARGET_R = 0.85;

function buildLesson(topicId, mem, now) {
  const t = TOPIC_BY_ID[topicId];
  const L = lvl(t.level);
  const pool = ITEMS.filter((i) => i.kind === "word" && i.topic === topicId);
  if (L.skills.indexOf("grammar") >= 0)
    pool.push.apply(pool, shuffle(ITEMS.filter((i) => i.kind === "grammar" && i.level === t.level)).slice(0, 3));
  if (L.skills.indexOf("read") >= 0)
    pool.push.apply(pool, ITEMS.filter((i) => i.kind === "read" && i.topic === topicId));

  return pool
    .map((it) => {
      const m = mem[it.id];
      const isNew = !m || m.reps === 0;
      return { it, key: isNew ? -1e9 : -Math.abs(retrievability(m, now) - TARGET_R) };
    })
    .sort((a, b) => a.key - b.key)
    .map((s) => s.it);
}

function buildReviewQueue(mem, now, size) {
  size = size || 12;
  return Object.keys(mem)
    .map((id) => ({ it: ITEM_BY_ID[id], r: retrievability(mem[id], now) }))
    .filter((x) => x.it && x.r < 0.93)
    .sort((a, b) => a.r - b.r)
    .slice(0, size)
    .map((x) => x.it);
}

/* ---------- Sinh dạng bài tập ---------- */
function buildExercise(item, mem, kid) {
  if (item.kind === "grammar") return { type: "fill", item: item, options: shuffle(item.opts) };
  if (item.kind === "read")    return { type: "read", item: item, options: shuffle(item.opts) };

  const reps = (mem[item.id] && mem[item.id].reps) || 0;
  const modes = kid ? ["listen", "viToEn", "speak", "enToVi"] : ["viToEn", "listen", "enToVi", "speak"];
  const mode = reps === 0 ? (kid ? "listen" : "viToEn") : modes[reps % modes.length];
  if (mode === "speak") return { type: "speak", item: item };

  const same  = shuffle(ITEMS.filter((i) => i.kind === "word" && i.topic === item.topic && i.id !== item.id)).slice(0, 3);
  const other = shuffle(ITEMS.filter((i) => i.kind === "word" && i.level === item.level && i.id !== item.id)).slice(0, 6);
  const seen = {}; const opts = [];
  same.concat(other).forEach((o) => {
    if (opts.length < 3 && !seen[o.id] && o.vi !== item.vi && o.en !== item.en) { seen[o.id] = 1; opts.push(o); }
  });
  return { type: mode, item: item, options: shuffle([item].concat(opts)) };
}

/* ---------- Bộ sinh ô chữ ----------
   Greedy + thử nhiều thứ tự; kiểm tra ràng buộc kề cạnh để không tạo "từ ma"
------------------------------------------------ */
const CW_SIZE = 13;

function cwCanPlace(grid, word, r, c, dir) {
  const L = word.length;
  const dr = dir === "V" ? 1 : 0, dc = dir === "H" ? 1 : 0;
  if (r < 0 || c < 0) return null;
  if (r + dr * (L - 1) >= CW_SIZE || c + dc * (L - 1) >= CW_SIZE) return null;
  const br = r - dr, bc = c - dc;
  if (br >= 0 && bc >= 0 && grid[br][bc]) return null;
  const ar = r + dr * L, ac = c + dc * L;
  if (ar < CW_SIZE && ac < CW_SIZE && grid[ar][ac]) return null;

  let cross = 0;
  for (let i = 0; i < L; i++) {
    const rr = r + dr * i, cc = c + dc * i;
    const cell = grid[rr][cc];
    if (cell) {
      if (cell !== word[i]) return null;
      cross++;
    } else {
      const sides = dir === "H" ? [[rr - 1, cc], [rr + 1, cc]] : [[rr, cc - 1], [rr, cc + 1]];
      for (let k = 0; k < 2; k++) {
        const sr = sides[k][0], sc = sides[k][1];
        if (sr >= 0 && sr < CW_SIZE && sc >= 0 && sc < CW_SIZE && grid[sr][sc]) return null;
      }
    }
  }
  return cross;
}

function cwTryBuild(words) {
  const grid = [];
  for (let i = 0; i < CW_SIZE; i++) grid.push(new Array(CW_SIZE).fill(null));
  const placed = [];
  const put = (e, r, c, dir) => {
    const dr = dir === "V" ? 1 : 0, dc = dir === "H" ? 1 : 0;
    for (let i = 0; i < e.w.length; i++) grid[r + dr * i][c + dc * i] = e.w[i];
    placed.push(Object.assign({}, e, { r, c, dir }));
  };
  const first = words[0];
  put(first, Math.floor(CW_SIZE / 2), Math.floor((CW_SIZE - first.w.length) / 2), "H");

  for (let k = 1; k < words.length; k++) {
    const e = words[k];
    let best = null;
    for (let pi = 0; pi < placed.length; pi++) {
      const p = placed[pi];
      for (let i = 0; i < p.w.length; i++)
        for (let j = 0; j < e.w.length; j++) {
          if (p.w[i] !== e.w[j]) continue;
          const dir = p.dir === "H" ? "V" : "H";
          const pr = p.r + (p.dir === "V" ? i : 0);
          const pc = p.c + (p.dir === "H" ? i : 0);
          const r = dir === "V" ? pr - j : pr;
          const c = dir === "H" ? pc - j : pc;
          const cross = cwCanPlace(grid, e.w, r, c, dir);
          if (cross === null || cross < 1) continue;
          const dist = Math.abs(r - CW_SIZE / 2) + Math.abs(c - CW_SIZE / 2);
          const score = cross * 100 - dist;
          if (!best || score > best.score) best = { r, c, dir, score };
        }
    }
    if (best) put(e, best.r, best.c, best.dir);
  }
  if (placed.length < 3) return null;

  let r0 = CW_SIZE, c0 = CW_SIZE, r1 = 0, c1 = 0;
  for (let r = 0; r < CW_SIZE; r++)
    for (let c = 0; c < CW_SIZE; c++)
      if (grid[r][c]) { r0 = Math.min(r0, r); c0 = Math.min(c0, c); r1 = Math.max(r1, r); c1 = Math.max(c1, c); }
  const H = r1 - r0 + 1, Wd = c1 - c0 + 1;
  const cut = [];
  for (let r = 0; r < H; r++) { const row = []; for (let c = 0; c < Wd; c++) row.push(grid[r + r0][c + c0]); cut.push(row); }
  const clues = placed.map((p) => Object.assign({}, p, { r: p.r - r0, c: p.c - c0 }));

  const nums = {}; let n = 0;
  clues.sort((a, b) => a.r - b.r || a.c - b.c).forEach((p) => {
    const key = p.r + "," + p.c;
    if (!(key in nums)) nums[key] = ++n;
    p.num = nums[key];
  });
  return { grid: cut, clues, nums, H, W: Wd };
}

function makeCrossword(entries, attempts) {
  attempts = attempts || 40;
  const valid = entries
    .map((e) => Object.assign({}, e, { w: e.en.toLowerCase() }))
    .filter((e) => /^[a-z]{3,9}$/.test(e.w));
  if (valid.length < 3) return null;

  let best = null;
  for (let a = 0; a < attempts; a++) {
    let order;
    if (a === 0) order = valid.slice().sort((x, y) => y.w.length - x.w.length);
    else {
      const s = shuffle(valid);
      const longest = s.slice().sort((x, y) => y.w.length - x.w.length)[0];
      order = [longest].concat(s.filter((x) => x !== longest));
    }
    const r = cwTryBuild(order.slice(0, 8));
    if (r && (!best || r.clues.length > best.clues.length)) best = r;
    if (best && best.clues.length === Math.min(valid.length, 8)) break;
  }
  return best;
}

/* ---------- Chấm phát âm: Levenshtein trên chuỗi chuẩn hoá ---------- */
function similarity(a, b) {
  const norm = (s) => String(s).toLowerCase().replace(/[^a-z ]/g, "").trim();
  a = norm(a); b = norm(b);
  if (!a || !b) return 0;
  const dp = [];
  for (let i = 0; i <= a.length; i++) { dp.push(new Array(b.length + 1).fill(0)); dp[i][0] = i; }
  for (let j = 0; j <= b.length; j++) dp[0][j] = j;
  for (let i = 1; i <= a.length; i++)
    for (let j = 1; j <= b.length; j++)
      dp[i][j] = Math.min(dp[i-1][j] + 1, dp[i][j-1] + 1, dp[i-1][j-1] + (a[i-1] === b[j-1] ? 0 : 1));
  return 1 - dp[a.length][b.length] / Math.max(a.length, b.length);
}

/* Xuất cho môi trường test (Node). Trong trình duyệt, dòng này bị bỏ qua. */
if (typeof module !== "undefined" && module.exports) {
  module.exports = { LEVELS, lvl, retrievability, review, nextInterval, emptyMem, ITEMS, ITEM_BY_ID, TOPIC_BY_ID, TOPICS, GRAMMAR, READINGS, buildLesson, buildReviewQueue, buildExercise, makeCrossword, similarity, DAY, shuffle };
}


/* ================================================================
   VƯỜN TỪ — GIAO DIỆN (vanilla JS, không phụ thuộc thư viện)
   ================================================================ */

const st = {
  now: Date.now(),
  mem: {},
  xp: 0, streak: 0, todayXp: 0, goal: 50,
  hearts: 5, combo: 0,
  screen: "map",
  level: null, topic: null,
  queue: [], idx: 0, ex: null, picked: null, result: null, sessionXp: 0, sessionTitle: "",
  game: null, gameState: null,
  toast: null, toastTimer: null,
};

const $ = (s) => document.querySelector(s);
const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const isKid = () => st.level !== null && st.level <= 2;

/* ---------- Giọng nói (bọc an toàn) ---------- */
function speak(text, rate) {
  try {
    if (typeof window === "undefined" || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US"; u.rate = rate || 0.85;
    window.speechSynthesis.speak(u);
  } catch (e) { /* trình duyệt không hỗ trợ */ }
}
function hasASR() {
  try { return !!(window.SpeechRecognition || window.webkitSpeechRecognition); } catch (e) { return false; }
}

/* ---------- Lưu / tải tiến độ ---------- */
const SKEY = "vuontu:v1";
function snapshot() { return { mem: st.mem, xp: st.xp, streak: st.streak, todayXp: st.todayXp, now: st.now }; }

/* Lưu tiến độ vào localStorage của trình duyệt.
   Dữ liệu nằm trên máy người học, không gửi đi đâu cả.
   Nếu trình duyệt chặn (chế độ ẩn danh, cookie tắt) → chạy trong bộ nhớ,
   người học vẫn có thể bấm "Lưu tiến độ" để tải file JSON về. */
let storageOK = true;
function save() {
  try { localStorage.setItem(SKEY, JSON.stringify(snapshot())); }
  catch (e) {
    if (storageOK) { storageOK = false; toast("Trình duyệt chặn lưu trữ — hãy dùng nút Lưu tiến độ"); }
  }
}
function load() {
  try {
    const raw = localStorage.getItem(SKEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    st.mem = d.mem || {}; st.xp = d.xp || 0; st.streak = d.streak || 0;
    st.todayXp = d.todayXp || 0; st.now = d.now || Date.now();
  } catch (e) { storageOK = false; }
}
function exportJSON() {
  const blob = new Blob([JSON.stringify(snapshot(), null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "vuon-tu-tien-do.json";
  a.click();
  toast("Đã tải file tiến độ về máy");
}
function importJSON(file) {
  const fr = new FileReader();
  fr.onload = () => {
    try {
      const d = JSON.parse(fr.result);
      st.mem = d.mem || {}; st.xp = d.xp || 0; st.streak = d.streak || 0;
      st.todayXp = d.todayXp || 0; st.now = d.now || Date.now();
      save(); render(); toast("Đã khôi phục tiến độ");
    } catch (e) { toast("File không hợp lệ"); }
  };
  fr.readAsText(file);
}

/* ---------- Toast ---------- */
function toast(msg) {
  st.toast = msg;
  const t = $("#toast");
  if (t) { t.textContent = msg; t.classList.add("show"); }
  clearTimeout(st.toastTimer);
  st.toastTimer = setTimeout(() => { const el = $("#toast"); if (el) el.classList.remove("show"); st.toast = null; }, 2200);
}

/* ---------- Ghi nhận kết quả vào FSRS ---------- */
function record(itemId, ok) {
  st.mem[itemId] = review(st.mem[itemId] || emptyMem(), ok, st.now);
  save();
}
function addXp(n) { if (n <= 0) return; st.xp += n; st.todayXp += n; st.sessionXp += n; }

/* ================================================================
   ĐIỀU HƯỚNG
   ================================================================ */
function go(screen) {
  st.screen = screen;
  render();
  try { if (window.scrollTo) window.scrollTo(0, 0); } catch (e) {}
}

function startLesson(topicId) {
  const t = TOPIC_BY_ID[topicId];
  st.topic = topicId; st.level = t.level;
  st.queue = buildLesson(topicId, st.mem, st.now);
  st.sessionTitle = t.name;
  beginQueue();
}
function startReview() {
  const q = buildReviewQueue(st.mem, st.now, 12);
  if (!q.length) { toast("Chưa có mục nào cần ôn"); return; }
  st.topic = null; st.level = null;
  st.queue = q; st.sessionTitle = "Ôn tập thông minh";
  beginQueue();
}
function beginQueue() {
  st.idx = 0; st.sessionXp = 0; st.combo = 0;
  st.gameState = {};
  st.hearts = isKid() ? 99 : 5;
  st.ex = buildExercise(st.queue[0], st.mem, isKid());
  st.picked = null; st.result = null;
  go("learn");
}
function checkAnswer() {
  if (!st.ex || st.result) return;
  const ex = st.ex;
  let ok;
  if (ex.type === "fill" || ex.type === "read") ok = st.picked === ex.item.a;
  else ok = st.picked === ex.item.id;
  grade(ok);
}
function grade(ok) {
  record(st.ex.item.id, ok);
  if (ok) {
    st.combo++;
    const gain = 10 + (st.combo % 3 === 0 ? 5 : 0);
    addXp(gain);
    if (st.ex.item.kind === "word") speak(st.ex.item.en);
    if (st.combo % 3 === 0) toast("Chuỗi " + st.combo + " câu đúng · +5 XP");
  } else {
    st.combo = 0;
    if (!isKid()) st.hearts--;
  }
  st.result = ok ? "ok" : "no";
  render();
}
function nextExercise() {
  if (!isKid() && st.hearts <= 0) return go("done");
  const i = st.idx + 1;
  if (i >= st.queue.length) return go("done");
  st.idx = i;
  st.ex = buildExercise(st.queue[i], st.mem, isKid());
  st.picked = null; st.result = null;
  render();
}
function travel(d) {
  st.now += d * DAY;
  st.streak = st.todayXp >= st.goal ? st.streak + d : 0;
  toast(st.todayXp >= st.goal ? "Qua " + d + " ngày · chuỗi tiếp tục 🔥" : "Qua " + d + " ngày · chưa đạt mục tiêu, chuỗi về 0");
  st.todayXp = 0;
  save(); render();
}

/* ================================================================
   RENDER
   ================================================================ */
function render() {
  const app = $("#app");
  if (!app) return;
  let html = "";
  switch (st.screen) {
    case "map":     html = viewMap(); break;
    case "topics":  html = viewTopics(); break;
    case "learn":   html = viewLearn(); break;
    case "done":    html = viewDone(); break;
    case "garden":  html = viewGarden(); break;
    case "games":   html = viewGames(); break;
    case "gpick":   html = viewGamePick(); break;
    case "gspeak":  html = viewGameSpeak(); break;
    case "gcross":  html = viewGameCross(); break;
    case "gmatch":  html = viewGameMatch(); break;
    default:        html = viewMap();
  }
  app.innerHTML = html;
  app.classList.remove("rise"); void app.offsetWidth; app.classList.add("rise");
  if (st.screen === "gcross") wireCrossword();
  if (st.screen === "learn" && st.ex && st.ex.type === "listen" && !st.result) speak(st.ex.item.en);
  renderNav();
}

function renderNav() {
  const nav = $("#nav");
  if (!nav) return;
  const inLesson = st.screen === "learn";
  nav.style.display = inLesson ? "none" : "flex";
  const tabs = [["map", "🗺️", "Học"], ["games", "🎮", "Trò chơi"], ["garden", "🌿", "Vườn"]];
  nav.innerHTML = tabs.map(([s, i, n]) => {
    const on = st.screen === s || (s === "map" && ["topics", "done"].indexOf(st.screen) >= 0) || (s === "games" && ["gpick", "gspeak", "gcross", "gmatch"].indexOf(st.screen) >= 0);
    return '<button class="tab' + (on ? " on" : "") + '" data-act="tab" data-arg="' + s + '"><span>' + i + "</span>" + n + "</button>";
  }).join("");
}

function statusBar(extra) {
  const seeds = Object.keys(st.mem).length;
  let h = '<div class="pills">';
  h += pill("🔥", st.streak, "ngày", "lychee");
  h += pill("⭐", st.xp, "XP", "mango");
  h += pill("🌱", seeds, "mục", "leaf");
  if (extra) h += extra;
  h += "</div>";
  return h;
}
const pill = (i, v, l, c) => '<div class="pill"><span>' + i + '</span><b class="' + c + '">' + v + '</b><i>' + l + "</i></div>";

/* ---------- Bản đồ ---------- */
function viewMap() {
  const due = Object.keys(st.mem).filter((id) => retrievability(st.mem[id], st.now) < 0.9).length;
  const pct = Math.min(100, (st.todayXp / st.goal) * 100);
  let h = statusBar();

  h += '<section class="card hero">' +
    '<div class="eyebrow">Vườn từ · 100 chủ đề · Pre-A1 → B2</div>' +
    "<h1>Mỗi từ là một cái cây.<br>Không tưới thì héo.</h1>" +
    '<div class="goal"><div class="goal-row"><span>Mục tiêu hôm nay</span><b>' + st.todayXp + "/" + st.goal + ' XP</b></div>' +
    '<div class="bar"><div class="fill" style="width:' + pct + "%;background:" + (pct >= 100 ? "var(--leaf)" : "var(--mango)") + '"></div></div></div>' +
    "</section>";

  if (due > 0)
    h += '<button class="btn btn-lychee ping" data-act="review">🔁 Ôn tập thông minh · ' + due + " mục sắp quên</button>";

  h += '<div class="levels">';
  LEVELS.forEach((L) => {
    const ts = TOPICS.filter((t) => t.level === L.id);
    const done = ts.filter((t) => t.words.some((w, i) => st.mem["w" + t.id + "-" + i])).length;
    h += '<button class="card level" data-act="level" data-arg="' + L.id + '">' +
      '<div class="badge" style="background:' + L.color + '">' + L.id + "</div>" +
      '<div class="lv-body"><div class="lv-name">' + L.name + ' <span>· ' + L.cefr + " · " + L.age + "</span></div>" +
      '<div class="lv-desc">' + L.desc + "</div>" +
      '<div class="bar sm"><div class="fill" style="width:' + (done / ts.length) * 100 + "%;background:" + L.color + '"></div></div></div>' +
      '<div class="lv-count">' + done + "/" + ts.length + "</div></button>";
  });
  h += "</div>";

  h += '<section class="card">' +
    '<div class="eyebrow">Bảng điều khiển thuật toán</div>' +
    "<p class=\"muted\">FSRS-lite chạy theo ngày thật. Tua thời gian để thấy trí nhớ suy giảm và các mục tự quay lại hàng đợi ôn.</p>" +
    '<div class="row">' +
    [1, 3, 7].map((d) => '<button class="btn btn-ghost" data-act="travel" data-arg="' + d + '">+' + d + " ngày</button>").join("") +
    "</div>" +
    '<div class="row" style="margin-top:8px">' +
    '<button class="btn btn-ghost" data-act="export">⬇︎ Lưu tiến độ</button>' +
    '<button class="btn btn-ghost" data-act="import">⬆︎ Khôi phục</button>' +
    "</div>" +
    '<input type="file" id="file" accept="application/json" hidden>' +
    "</section>";
  return h;
}

/* ---------- Danh sách chủ đề ---------- */
function viewTopics() {
  const L = lvl(st.level);
  const ts = TOPICS.filter((t) => t.level === st.level);
  let h = '<button class="back" data-act="tab" data-arg="map">← Bản đồ</button>';
  h += '<section class="card" style="border-left:6px solid ' + L.color + '">' +
    '<div class="eyebrow">Cấp ' + L.id + " · " + L.cefr + " · " + L.age + "</div>" +
    "<h2>" + L.name + "</h2><p class=\"muted\">" +
    (st.level <= 2
      ? "Chỉ nghe · luyện phát âm · từ vựng. Không ngữ pháp trừu tượng — trẻ học qua âm thanh và hình ảnh. Không mất tim."
      : "Nghe · phát âm · từ vựng · ngữ pháp · đọc hiểu.") +
    "</p></section>";
  h += '<div class="grid2">';
  ts.forEach((t) => {
    const done = t.words.filter((w, i) => st.mem["w" + t.id + "-" + i]).length;
    const hasRead = READINGS.some((r) => r.topicId === t.id);
    h += '<button class="card tile" data-act="topic" data-arg="' + t.id + '">' +
      '<div class="tile-emoji">' + t.emoji + "</div>" +
      '<div class="tile-name">' + esc(t.name) + "</div>" +
      '<div class="tile-meta">' + done + "/" + t.words.length + " từ" + (hasRead ? " · 📖" : "") + "</div></button>";
  });
  h += "</div>";
  return h;
}

/* ---------- Bài học ---------- */
function viewLearn() {
  const ex = st.ex, it = ex.item;
  const pct = ((st.idx + (st.result ? 1 : 0)) / st.queue.length) * 100;
  const kid = isKid();
  const prompts = { viToEn: "Chọn từ tiếng Anh đúng", enToVi: "Từ này nghĩa là gì?", listen: "Nghe và chọn từ bạn nghe được", speak: "Nhấn micro và đọc to", fill: "Chọn đáp án đúng", read: "Đọc đoạn văn và trả lời" };

  let h = '<div class="topbar">' +
    '<button class="x" data-act="tab" data-arg="map" aria-label="Thoát">✕</button>' +
    '<div class="bar"><div class="fill" style="width:' + pct + '%;background:var(--leaf)"></div></div>' +
    (kid ? "" : '<span class="hearts">' + "❤️".repeat(Math.max(0, st.hearts)) + "</span>") +
    "</div>";
  h += '<div class="lesson-title">' + esc(st.sessionTitle) + " · " + (st.idx + 1) + "/" + st.queue.length + "</div>";

  h += '<section class="card exercise' + (kid ? " kid" : "") + '">';
  h += '<div class="eyebrow">' + prompts[ex.type] + "</div>";

  if (ex.type === "read") {
    h += '<div class="passage"><div class="passage-head"><span>' + esc(it.passage.title) + "</span>" +
      '<button class="mini" data-act="say" data-arg="' + esc(it.passage.text) + '">🔊 Nghe</button></div>' +
      "<p>" + esc(it.passage.text) + "</p>" +
      '<div class="q">' + esc(it.q) + "</div></div>";
  } else if (ex.type === "fill") {
    const parts = it.q.split("___");
    h += '<div class="gpoint">' + esc(it.point) + "</div>" +
      '<div class="prompt-big">' + esc(parts[0]) + '<span class="blank">' + (st.result ? " " + esc(it.a) + " " : " ___ ") + "</span>" + esc(parts[1] || "") + "</div>";
  } else if (ex.type === "viToEn") {
    h += '<div class="big-emoji">' + it.emoji + '</div><div class="prompt-big">' + esc(it.vi) + "</div>";
  } else if (ex.type === "enToVi") {
    h += '<div class="big-emoji">' + it.emoji + '</div><button class="prompt-big linkish" data-act="say" data-arg="' + esc(it.en) + '">' + esc(it.en) + " 🔊</button>";
  } else if (ex.type === "listen") {
    h += '<div class="center"><button class="speaker" data-act="say" data-arg="' + esc(it.en) + '" aria-label="Phát lại">🔊</button></div>';
  } else if (ex.type === "speak") {
    h += viewSpeakBody(it);
  }

  if (ex.type !== "speak") {
    h += '<div class="options">';
    ex.options.forEach((o) => {
      const isText = ex.type === "fill" || ex.type === "read";
      const val = isText ? o : o.id;
      const label = isText ? o : ex.type === "enToVi" ? o.vi : o.emoji + " " + o.en;
      const correct = isText ? it.a : it.id;
      let cls = "opt";
      if (st.result) {
        if (val === correct) cls += " right";
        else if (st.picked === val) cls += " wrong";
      } else if (st.picked === val) cls += " sel";
      h += '<button class="' + cls + '" data-act="pick" data-arg="' + esc(val) + '"' + (st.result ? " disabled" : "") + ">" + esc(label) + "</button>";
    });
    h += "</div>";
  }
  h += "</section>";

  if (st.result) {
    const ok = st.result === "ok";
    let why = "";
    if (ex.type === "fill") why = esc(it.why);
    else if (ex.type === "read") why = "Đáp án: <b>" + esc(it.a) + "</b>";
    else why = "<b>" + esc(it.en) + "</b> = " + esc(it.vi);
    h += '<div class="feedback ' + (ok ? "ok" : "no") + '"><div class="fb-title">' + (ok ? "Chuẩn luôn! 🌱" : "Chưa đúng") + "</div><div class=\"fb-body\">" + why + "</div></div>";
  }

  const ready = ex.type === "speak" ? false : st.picked !== null;
  if (st.result)
    h += '<button class="btn ' + (st.result === "ok" ? "btn-leaf" : "btn-lychee") + '" data-act="next">Tiếp tục</button>';
  else if (ex.type !== "speak")
    h += '<button class="btn btn-leaf" data-act="check"' + (ready ? "" : " disabled") + ">Kiểm tra</button>";
  return h;
}

function viewSpeakBody(it) {
  const s = st.gameState || {};
  if (!hasASR())
    return '<div class="notice">Trình duyệt này không hỗ trợ nhận diện giọng nói. Hãy dùng <b>Chrome</b> hoặc <b>Edge</b>.' +
      '<button class="btn" style="margin-top:10px" data-act="speak-skip">Tôi đã đọc xong</button></div>';
  return '<div class="big-emoji">' + it.emoji + "</div>" +
    '<button class="prompt-big linkish" data-act="say" data-arg="' + esc(it.en) + '">' + esc(it.en) + " 🔊</button>" +
    '<div class="muted center">' + esc(it.vi) + "</div>" +
    '<div class="center" style="margin-top:16px">' +
    '<button class="mic' + (s.listening ? " listening ping" : "") + '" data-act="mic">🎙️</button>' +
    '<div class="mic-hint' + (s.listening ? " live" : "") + '">' + (s.listening ? "Đang nghe… đọc to lên!" : "Nhấn micro rồi đọc") + "</div></div>";
}

/* ---------- Kết thúc buổi học ---------- */
function viewDone() {
  const won = st.hearts > 0;
  return statusBar() + '<section class="card center pad">' +
    '<div style="font-size:56px">' + (won ? "🌻" : "🥀") + "</div>" +
    "<h2>" + (won ? "Hoàn thành!" : "Hết tim") + "</h2>" +
    '<p class="muted">' + esc(st.sessionTitle) + " · +" + st.sessionXp + " XP · " + Math.min(st.idx + 1, st.queue.length) + "/" + st.queue.length + " câu</p>" +
    '<div class="notice" style="text-align:left;margin:14px 0">FSRS đã cập nhật độ bền trí nhớ cho từng mục. Bấm <b>Tua thời gian</b> ở bản đồ để xem chúng suy giảm và quay lại hàng đợi ôn.</div>' +
    '<button class="btn" data-act="tab" data-arg="map">Về bản đồ</button></section>';
}

/* ---------- Vườn trí nhớ ---------- */
function viewGarden() {
  const rows = Object.keys(st.mem)
    .map((id) => ({ id, item: ITEM_BY_ID[id], r: retrievability(st.mem[id], st.now), S: st.mem[id].S, D: st.mem[id].D, due: nextInterval(st.mem[id].S) }))
    .filter((x) => x.item)
    .sort((a, b) => a.r - b.r);

  let h = statusBar();
  h += '<section class="card"><div class="eyebrow">Vườn trí nhớ</div><h2>Sức khoẻ từng mục, ngay lúc này</h2>' +
    '<p class="muted"><b>R</b> = xác suất bạn còn nhớ nếu bị hỏi ngay bây giờ. <b>S</b> = độ bền (số ngày để R rơi về 90%).</p></section>';

  if (!rows.length) {
    h += '<section class="card center pad"><p class="muted">Vườn còn trống. Học một bài rồi quay lại đây.</p>' +
      '<button class="btn" data-act="tab" data-arg="map">Bắt đầu học</button></section>';
    return h;
  }

  h += '<section class="card"><div class="plots">';
  rows.forEach((r) => {
    const g = Math.round(r.r * 100);
    const label = (r.item.en || r.item.point || "Đọc hiểu") + " · R=" + g + "%";
    h += '<div class="plot" title="' + esc(label) + '" style="background:color-mix(in srgb, var(--leaf) ' + g + '%, #F3D9DF);opacity:' + (0.4 + r.r * 0.6) + '">' + (r.item.emoji || "📐") + "</div>";
  });
  h += "</div></section>";

  h += '<section class="card table-card"><table><thead><tr><th>Mục</th><th>R</th><th>S (ngày)</th><th>Khó</th><th>Ôn sau</th></tr></thead><tbody>';
  rows.slice(0, 80).forEach((r) => {
    h += "<tr><td><b>" + (r.item.emoji || "📐") + " " + esc(r.item.en || r.item.point || "Đọc hiểu") + "</b></td>" +
      '<td class="' + (r.r < 0.85 ? "lychee" : "leaf") + '"><b>' + Math.round(r.r * 100) + "%</b></td>" +
      "<td>" + r.S.toFixed(1) + "</td><td>" + r.D.toFixed(1) + "</td>" +
      '<td class="muted">' + (r.due < 1 ? "hôm nay" : Math.round(r.due) + " ngày") + "</td></tr>";
  });
  h += "</tbody></table></section>";
  return h;
}

/* ================================================================
   TRÒ CHƠI
   ================================================================ */
const GAMES = [
  { id: "gspeak", name: "Nhìn hình & phát âm", emoji: "🎙️", color: "var(--lychee)", desc: "Xem hình, đọc to, máy chấm điểm phát âm", note: hasASR() ? "Sẵn sàng" : "Cần Chrome / Edge" },
  { id: "gcross", name: "Ô chữ", emoji: "🧩", color: "var(--mango)", desc: "Điền từ tiếng Anh theo nghĩa tiếng Việt", note: "Sinh tự động từ chủ đề" },
  { id: "gmatch", name: "Lật thẻ ghép cặp", emoji: "🃏", color: "var(--violet)", desc: "Ghép từ tiếng Anh với nghĩa tiếng Việt", note: "Rèn trí nhớ nhanh" },
];

function viewGames() {
  let h = statusBar();
  h += '<section class="card"><div class="eyebrow">Sảnh trò chơi</div><h1 style="font-size:26px">Học bằng cách chơi.<br>Vẫn tính vào vườn.</h1>' +
    '<p class="muted">Mọi kết quả đúng/sai đều đưa vào FSRS như một lần ôn tập thật.</p></section>';
  h += '<div class="levels">';
  GAMES.forEach((g) => {
    h += '<button class="card level" data-act="game" data-arg="' + g.id + '">' +
      '<div class="badge" style="background:' + g.color + ';font-size:24px">' + g.emoji + "</div>" +
      '<div class="lv-body"><div class="lv-name">' + g.name + "</div>" +
      '<div class="lv-desc">' + g.desc + "</div>" +
      '<div class="lv-note" style="color:' + g.color + '">' + g.note + "</div></div>" +
      '<div class="lv-count">→</div></button>';
  });
  h += "</div>";
  return h;
}

function viewGamePick() {
  const g = GAMES.find((x) => x.id === st.game);
  // Ô chữ: chỉ hiện chủ đề THỰC SỰ dựng được lưới (đếm từ là chưa đủ —
  // vẫn có chủ đề đủ từ nhưng các từ không giao nhau được, ví dụ "Chào hỏi").
  const usable = st.game === "gcross" ? TOPICS.filter((t) => !!cwFor(t.id)) : TOPICS;
  let h = '<button class="back" data-act="tab" data-arg="games">← Sảnh trò chơi</button>';
  h += '<section class="card"><div style="font-size:30px">' + g.emoji + "</div><h2>Chọn chủ đề</h2>" +
    '<p class="muted">' + g.desc + " · " + usable.length + " chủ đề khả dụng</p></section>";
  h += '<div class="grid2">';
  usable.forEach((t) => {
    h += '<button class="card tile" data-act="gtopic" data-arg="' + t.id + '">' +
      '<div class="tile-emoji">' + t.emoji + '</div><div class="tile-name">' + esc(t.name) + "</div>" +
      '<div class="tile-meta">Cấp ' + t.level + " · " + t.words.length + " từ</div></button>";
  });
  h += "</div>";
  return h;
}

/* ---------- Trò 1: Nhìn hình & phát âm ---------- */
function startGameSpeak(topicId) {
  const t = TOPIC_BY_ID[topicId];
  st.topic = topicId;
  st.gameState = {
    deck: shuffle(t.words.map((w, i) => ({ key: "w" + t.id + "-" + i, en: w[0], vi: w[1], emoji: t.emoji }))),
    i: 0, total: 0, best: 0, streak: 0, listening: false, scored: false, score: 0, heard: "",
  };
  go("gspeak");
}
function viewGameSpeak() {
  const s = st.gameState, t = TOPIC_BY_ID[st.topic];
  if (s.i >= s.deck.length) {
    const avg = s.total / s.deck.length;
    return '<section class="card center pad"><div style="font-size:54px">' + (avg >= 0.8 ? "🎉" : avg >= 0.6 ? "👍" : "💪") + "</div>" +
      "<h2>Xong vòng phát âm</h2>" +
      '<div class="score ' + (avg >= 0.7 ? "leaf" : "lychee") + '">' + Math.round(avg * 100) + "%</div>" +
      '<p class="muted">Điểm trung bình · Cao nhất ' + Math.round(s.best * 100) + "%</p>" +
      '<button class="btn" data-act="tab" data-arg="games">Về sảnh trò chơi</button></section>';
  }
  const it = s.deck[s.i];
  let h = '<div class="topbar"><button class="x" data-act="tab" data-arg="games" aria-label="Thoát">✕</button>' +
    '<div class="bar"><div class="fill" style="width:' + (s.i / s.deck.length) * 100 + '%;background:var(--leaf)"></div></div>' +
    '<span class="hearts">' + (s.i + 1) + "/" + s.deck.length + "</span></div>";
  h += '<div class="lesson-title">' + esc(t.name) + " · Nhìn hình & phát âm</div>";
  h += '<section class="card exercise center">';
  if (s.streak >= 2) h += '<div class="streak">🔥 Chuỗi ' + s.streak + "</div>";
  h += '<div class="huge-emoji">' + it.emoji + "</div>";

  if (!hasASR()) {
    h += '<div class="notice">Trình duyệt không hỗ trợ nhận diện giọng nói. Hãy dùng <b>Chrome</b> hoặc <b>Edge</b>.</div>' +
      '<button class="btn" style="margin-top:10px" data-act="gs-next">Bỏ qua từ này</button></section>';
    return h;
  }
  if (s.scored) {
    h += '<div class="score ' + (s.score >= 0.7 ? "leaf" : "lychee") + '">' + Math.round(s.score * 100) + "%</div>" +
      '<div class="prompt-big">' + esc(it.en) + '</div><div class="muted">' + esc(it.vi) + "</div>" +
      '<div class="heard">Máy nghe được: “' + esc(s.heard || "—") + "”</div>" +
      '<div class="row" style="margin-top:14px">' +
      '<button class="btn btn-ghost" data-act="say" data-arg="' + esc(it.en) + '">🔊 Nghe mẫu</button>' +
      '<button class="btn btn-leaf" data-act="gs-next">Tiếp →</button></div>';
  } else {
    h += '<div class="muted">Từ này đọc thế nào?</div>' +
      '<button class="hintlink" data-act="say" data-arg="' + esc(it.en) + '">🔊 Nghe gợi ý</button>' +
      '<div><button class="mic' + (s.listening ? " listening ping" : "") + '" data-act="gs-mic">🎙️</button></div>' +
      '<div class="mic-hint' + (s.listening ? " live" : "") + '">' + (s.listening ? "Đang nghe… đọc to lên!" : "Nhấn micro rồi đọc") + "</div>";
  }
  h += "</section>";
  return h;
}

/* ---------- Trò 2: Ô chữ ---------- */
const CW_CACHE = {};
function cwFor(topicId) {
  if (!(topicId in CW_CACHE)) {
    const t = TOPIC_BY_ID[topicId];
    CW_CACHE[topicId] = makeCrossword(t.words.map((w) => ({ en: w[0], vi: w[1] })));
  }
  return CW_CACHE[topicId];
}
function startGameCross(topicId) {
  const puzzle = cwFor(topicId);
  if (!puzzle) { toast("Chủ đề này không dựng được ô chữ"); return; }
  st.topic = topicId;
  st.gameState = { puzzle, cells: {}, checked: false, solved: [] };
  go("gcross");
}
function viewGameCross() {
  const s = st.gameState, t = TOPIC_BY_ID[st.topic];
  const p = s.puzzle;
  const cell = Math.max(24, Math.min(34, Math.floor(320 / p.W)));

  let h = '<div class="topbar"><button class="x" data-act="tab" data-arg="games" aria-label="Thoát">✕</button>' +
    '<div class="bar"><div class="fill" style="width:' + (s.checked ? 100 : 0) + '%;background:var(--leaf)"></div></div>' +
    '<span class="hearts">' + p.clues.length + " từ</span></div>";
  h += '<div class="lesson-title">' + esc(t.name) + " · Ô chữ</div>";

  h += '<section class="card cw-wrap"><div class="cw" style="grid-template-columns:repeat(' + p.W + "," + cell + "px);--cw:" + cell + 'px">';
  for (let r = 0; r < p.H; r++)
    for (let c = 0; c < p.W; c++) {
      const sol = p.grid[r][c];
      const key = r + "," + c;
      if (!sol) { h += '<div class="cw-void"></div>'; continue; }
      const val = (s.cells[key] || "").toUpperCase();
      const num = p.nums[key];
      let cls = "cw-cell";
      if (s.checked) cls += (s.cells[key] || "") === sol ? " right" : " wrong";
      h += '<div class="' + cls + '">' + (num ? '<span class="cw-num">' + num + "</span>" : "") +
        '<input maxlength="1" inputmode="text" autocapitalize="characters" data-cw="' + key + '" value="' + val + '"' + (s.checked ? " disabled" : "") + "></div>";
    }
  h += "</div></section>";

  h += '<section class="card"><div class="eyebrow">Gợi ý</div>';
  ["H", "V"].forEach((d) => {
    const list = p.clues.filter((x) => x.dir === d);
    if (!list.length) return;
    h += '<div class="clue-group"><div class="clue-head">' + (d === "H" ? "Hàng ngang →" : "Hàng dọc ↓") + "</div>";
    list.forEach((x) => {
      const ok = s.solved.indexOf(x.w) >= 0;
      h += '<div class="clue' + (s.checked ? (ok ? " ok" : " miss") : "") + '"><b>' + x.num + ".</b><span>" + esc(x.vi) +
        ' <i>(' + x.w.length + " chữ)</i>" + (s.checked && !ok ? ' <b class="lychee">→ ' + x.w + "</b>" : "") + "</span></div>";
    });
    h += "</div>";
  });
  h += "</section>";

  if (s.checked) {
    const all = s.solved.length === p.clues.length;
    h += '<section class="card center" style="padding:14px;' + (all ? "background:#E8F8F0" : "") + '"><b style="font-size:19px">' +
      s.solved.length + "/" + p.clues.length + " từ đúng " + (all ? "🎉" : "") + "</b></section>" +
      '<button class="btn" data-act="tab" data-arg="games">Về sảnh trò chơi</button>';
  } else {
    h += '<div class="row"><button class="btn btn-ghost" data-act="cw-reveal">Chịu thua</button>' +
      '<button class="btn btn-leaf" data-act="cw-check" style="flex:2">Kiểm tra</button></div>';
  }
  return h;
}
function wireCrossword() {
  const s = st.gameState;
  document.querySelectorAll("[data-cw]").forEach((inp) => {
    inp.addEventListener("input", (e) => {
      const key = inp.getAttribute("data-cw");
      const ch = String(e.target.value).slice(-1).toLowerCase();
      if (ch && !/[a-z]/.test(ch)) { e.target.value = (s.cells[key] || "").toUpperCase(); return; }
      s.cells[key] = ch;
      e.target.value = ch.toUpperCase();
      if (ch) {
        const parts = key.split(",");
        const r = +parts[0], c = +parts[1];
        const nx = document.querySelector('[data-cw="' + r + "," + (c + 1) + '"]') || document.querySelector('[data-cw="' + (r + 1) + "," + c + '"]');
        if (nx) nx.focus();
      }
    });
  });
}
function crosswordCheck() {
  const s = st.gameState, p = s.puzzle;
  const solved = [];
  p.clues.forEach((x) => {
    const dr = x.dir === "V" ? 1 : 0, dc = x.dir === "H" ? 1 : 0;
    let ok = true;
    for (let i = 0; i < x.w.length; i++)
      if ((s.cells[(x.r + dr * i) + "," + (x.c + dc * i)] || "") !== x.w[i]) ok = false;
    if (ok) solved.push(x.w);
    record("cw-" + st.topic + "-" + x.w, ok);
  });
  s.solved = solved; s.checked = true;
  addXp(solved.length * 12);
  if (solved.length === p.clues.length) speak("Excellent");
  render();
}
function crosswordReveal() {
  const s = st.gameState, p = s.puzzle;
  for (let r = 0; r < p.H; r++)
    for (let c = 0; c < p.W; c++)
      if (p.grid[r][c]) s.cells[r + "," + c] = p.grid[r][c];
  s.checked = true; s.solved = [];
  render();
}

/* ---------- Trò 3: Lật thẻ ghép cặp ---------- */
function startGameMatch(topicId) {
  const t = TOPIC_BY_ID[topicId];
  const pairs = t.words.slice(0, 6);
  const deck = shuffle(pairs.reduce((acc, w, i) => acc.concat([
    { uid: "e" + i, pair: i, face: w[0], side: "en" },
    { uid: "v" + i, pair: i, face: w[1], side: "vi" },
  ]), []));
  st.topic = topicId;
  st.gameState = { pairs, deck, open: [], matched: [], moves: 0, busy: false };
  go("gmatch");
}
function viewGameMatch() {
  const s = st.gameState, t = TOPIC_BY_ID[st.topic];
  if (s.matched.length === s.pairs.length)
    return '<section class="card center pad"><div style="font-size:54px">🎯</div><h2>Ghép xong!</h2>' +
      '<p class="muted">' + s.moves + " lượt lật · " + s.pairs.length + " cặp</p>" +
      '<button class="btn" data-act="tab" data-arg="games">Về sảnh trò chơi</button></section>';

  let h = '<div class="topbar"><button class="x" data-act="tab" data-arg="games" aria-label="Thoát">✕</button>' +
    '<div class="bar"><div class="fill" style="width:' + (s.matched.length / s.pairs.length) * 100 + '%;background:var(--leaf)"></div></div>' +
    '<span class="hearts">' + s.moves + " lượt</span></div>";
  h += '<div class="lesson-title">' + esc(t.name) + " · Ghép cặp</div>";
  h += '<div class="cards">';
  s.deck.forEach((c, i) => {
    const open = s.open.some((o) => o.uid === c.uid);
    const done = s.matched.indexOf(c.pair) >= 0;
    const show = open || done;
    h += '<button class="mcard' + (done ? " done" : open ? " open" : "") + (c.side === "en" ? " en" : "") + '" data-act="flip" data-arg="' + i + '"' + (done || s.busy ? " disabled" : "") + ">" +
      (show ? esc(c.face) : '<span class="mcard-back">' + t.emoji + "</span>") + "</button>";
  });
  h += "</div>";
  return h;
}
function flipCard(i) {
  const s = st.gameState;
  if (s.busy) return;
  const c = s.deck[i];
  if (s.matched.indexOf(c.pair) >= 0) return;
  if (s.open.some((o) => o.uid === c.uid)) return;
  if (s.open.length >= 2) return;
  s.open.push(c);
  if (s.open.length === 2) {
    s.busy = true; s.moves++;
    const a = s.open[0], b = s.open[1];
    const ok = a.pair === b.pair;
    render();
    setTimeout(() => {
      if (ok) { s.matched.push(a.pair); speak(s.pairs[a.pair][0]); addXp(10); }
      record("mm-" + st.topic + "-" + a.pair, ok);
      s.open = []; s.busy = false;
      render();
    }, ok ? 550 : 950);
    return;
  }
  render();
}

/* ================================================================
   NHẬN DIỆN GIỌNG NÓI
   ================================================================ */
function runASR(target, onDone) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { onDone(null); return; }
  let r;
  try { r = new SR(); } catch (e) { onDone(null); return; }
  r.lang = "en-US"; r.interimResults = false; r.maxAlternatives = 3;
  r.onresult = (e) => {
    const alts = [];
    for (let i = 0; i < e.results[0].length; i++) alts.push(e.results[0][i].transcript);
    let best = 0;
    alts.forEach((t) => { best = Math.max(best, similarity(t, target)); });
    onDone({ score: best, heard: alts[0] });
  };
  r.onerror = () => onDone(null);
  try { r.start(); } catch (e) { onDone(null); }
}

/* ================================================================
   XỬ LÝ SỰ KIỆN (uỷ quyền)
   ================================================================ */
function onClick(e) {
  const btn = e.target.closest("[data-act]");
  if (!btn) return;
  const act = btn.getAttribute("data-act");
  const arg = btn.getAttribute("data-arg");

  switch (act) {
    case "tab":
      if (arg === "map") { st.level = null; st.topic = null; }
      go(arg);
      break;
    case "level": st.level = +arg; go("topics"); break;
    case "topic": startLesson(+arg); break;
    case "review": startReview(); break;
    case "pick": if (!st.result) { st.picked = arg; render(); } break;
    case "check": checkAnswer(); break;
    case "next": nextExercise(); break;
    case "say": speak(arg, 0.75); break;
    case "travel": travel(+arg); break;
    case "export": exportJSON(); break;
    case "import": { const f = $("#file"); if (f) f.click(); break; }
    case "game": st.game = arg; go("gpick"); break;
    case "gtopic":
      if (st.game === "gspeak") startGameSpeak(+arg);
      else if (st.game === "gcross") startGameCross(+arg);
      else startGameMatch(+arg);
      break;

    case "mic": {
      if (!st.gameState) st.gameState = {};
      st.gameState.listening = true; render();
      runASR(st.ex.item.en, (res) => {
        st.gameState.listening = false;
        if (!res) { toast("Không nghe được, thử lại"); render(); return; }
        const ok = res.score >= 0.7;
        toast("Phát âm: " + Math.round(res.score * 100) + "%");
        grade(ok);
      });
      break;
    }
    case "speak-skip": grade(true); break;

    case "gs-mic": {
      const s = st.gameState;
      const it = s.deck[s.i];
      s.listening = true; render();
      runASR(it.en, (res) => {
        s.listening = false;
        if (!res) { toast("Không nghe được, thử lại"); render(); return; }
        const ok = res.score >= 0.7;
        s.scored = true; s.score = res.score; s.heard = res.heard;
        s.total += res.score; s.best = Math.max(s.best, res.score);
        s.streak = ok ? s.streak + 1 : 0;
        record(it.key, ok);
        addXp(ok ? (res.score >= 0.9 ? 15 : 10) : 0);
        render();
      });
      break;
    }
    case "gs-next": {
      const s = st.gameState;
      s.i++; s.scored = false; s.score = 0; s.heard = ""; s.listening = false;
      render();
      break;
    }
    case "cw-check": crosswordCheck(); break;
    case "cw-reveal": crosswordReveal(); break;
    case "flip": flipCard(+arg); break;
  }
}

/* ================================================================
   KHỞI ĐỘNG
   ================================================================ */
function boot() {
  document.addEventListener("click", onClick);
  document.addEventListener("change", (e) => {
    if (e.target && e.target.id === "file" && e.target.files && e.target.files[0]) importJSON(e.target.files[0]);
  });
  load();
  render();
}
/* Cửa sổ gỡ lỗi: mở console gõ VT.st để xem toàn bộ trạng thái, VT.mem() để xem bộ nhớ FSRS */
if (typeof window !== "undefined")
  window.VT = { st, ITEMS, TOPICS, LEVELS, retrievability, review, makeCrossword, render,
                mem: () => st.mem, reset: () => { st.mem = {}; st.xp = 0; st.streak = 0; st.todayXp = 0; save(); render(); } };

if (typeof document !== "undefined" && document.getElementById("app")) boot();


/* Chạy ngoại tuyến (tuỳ chọn): cần file sw.js đặt cùng thư mục */
if ("serviceWorker" in navigator && location.protocol === "https:") {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("sw.js").catch(function () {});
  });
}
</script>
