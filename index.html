<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#E9EFFC">
<meta name="description" content="Vườn từ — học tiếng Anh cho người Việt. 100 chủ đề, 5 cấp độ Pre-A1 đến B2, hơn 2300 từ, nhiều dạng bài tập và trò chơi, thuật toán lặp lại ngắt quãng FSRS.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Vườn từ">
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22V%C6%B0%E1%BB%9Dn%20t%E1%BB%AB%20%E2%80%94%20H%E1%BB%8Dc%20ti%E1%BA%BFng%20Anh%22%2C%22short_name%22%3A%22V%C6%B0%E1%BB%9Dn%20t%E1%BB%AB%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23E9EFFC%22%2C%22theme_color%22%3A%22%23E9EFFC%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage/svg%2Bxml%2C%253Csvg%20xmlns%3D%2527http%3A//www.w3.org/2000/svg%2527%20viewBox%3D%25270%200%20100%20100%2527%253E%253Crect%20width%3D%2527100%2527%20height%3D%2527100%2527%20rx%3D%252722%2527%20fill%3D%2527%252317255A%2527/%253E%253Ctext%20y%3D%252772%2527%20x%3D%252750%2527%20font-size%3D%252760%2527%20text-anchor%3D%2527middle%2527%253E%25F0%259F%258C%25B1%253C/text%253E%253C/svg%253E%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image/svg%2Bxml%22%7D%5D%7D">
<link rel="icon" href="data:image/svg+xml,%%3Csvg xmlns=%%27http://www.w3.org/2000/svg%%27 viewBox=%%270 0 100 100%%27%%3E%%3Ctext y=%%2780%%27 font-size=%%2790%%27%%3E%%F0%%9F%%8C%%B1%%3C/text%%3E%%3C/svg%%3E">
<title>Vườn từ — Học tiếng Anh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#17255A; --ink2:#556090; --sky:#E9EFFC; --card:#FFFFFF;
  --mango:#F5A623; --lychee:#E8506E; --leaf:#2BB673; --violet:#8B5CF6;
  --line:#D5DEF5; --shadow:#C9D4EE;
  --display:'Baloo 2', ui-rounded, 'Segoe UI', system-ui, sans-serif;
  --body:'Be Vietnam Pro', system-ui, -apple-system, sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--sky); color:var(--ink); font-family:var(--body);
  -webkit-font-smoothing:antialiased; padding-bottom:78px;
}
#app{max-width:600px;margin:0 auto;padding:16px 16px 8px}
h1{font-family:var(--display);font-weight:800;font-size:28px;margin:2px 0 0;letter-spacing:-.4px;line-height:1.15}
h2{font-family:var(--display);font-weight:800;font-size:23px;margin:2px 0 0;letter-spacing:-.3px}
p{margin:6px 0 0}
.muted{color:var(--ink2);font-size:13px;line-height:1.55}
.center{text-align:center}
.pad{padding:24px 18px}
.leaf{color:var(--leaf)} .lychee{color:var(--lychee)} .mango{color:var(--mango)}

/* Thẻ */
.card{
  background:var(--card); border:1px solid var(--line); border-radius:22px;
  padding:18px; box-shadow:0 2px 0 var(--shadow); margin-bottom:12px;
  width:100%; text-align:left; font-family:var(--body); color:var(--ink);
}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink2)}

/* Pills trạng thái */
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.pill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px;display:flex;gap:6px;align-items:center;font-size:13px}
.pill b{font-family:var(--display);font-size:15px}
.pill i{color:var(--ink2);font-size:11px;font-style:normal}

/* Nút */
.btn{
  font-family:var(--display);font-weight:700;font-size:16px;border:none;border-radius:16px;
  padding:14px 18px;cursor:pointer;width:100%;color:#fff;background:var(--ink);
  box-shadow:0 4px 0 #0E1740;margin-bottom:12px;transition:transform .05s;
}
.btn:active:not(:disabled){transform:translateY(2px);box-shadow:0 2px 0 #0E1740}
.btn:disabled{background:#C6D0E8;box-shadow:none;cursor:not-allowed}
.btn-leaf{background:var(--leaf);box-shadow:0 4px 0 #1D8F59}
.btn-leaf:active:not(:disabled){box-shadow:0 2px 0 #1D8F59}
.btn-lychee{background:var(--lychee);box-shadow:0 4px 0 #B93C55}
.btn-lychee:active:not(:disabled){box-shadow:0 2px 0 #B93C55}
.btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:none;font-size:15px}
.btn-ghost:active{transform:translateY(1px)}
.row{display:flex;gap:8px}
.row .btn{flex:1}
.back{border:none;background:transparent;color:var(--ink2);font-size:14px;cursor:pointer;padding:0;margin-bottom:10px;font-family:var(--body)}
button:focus-visible,input:focus-visible{outline:3px solid var(--mango);outline-offset:2px}

/* Hero + mục tiêu */
.hero h1{margin-top:4px}
.goal{margin-top:14px}
.goal-row{display:flex;justify-content:space-between;font-size:12px;color:var(--ink2);margin-bottom:5px}
.bar{flex:1;height:10px;background:var(--sky);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
.bar.sm{height:6px;margin-top:7px;border:none}
.fill{height:100%;border-radius:99px;transition:width .4s}

/* Cấp độ / trò chơi */
.levels{display:grid;gap:10px}
.level{display:flex;gap:14px;align-items:center;cursor:pointer;margin-bottom:0}
.badge{width:52px;height:52px;border-radius:18px;color:#fff;display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:21px;flex-shrink:0}
.lv-body{flex:1;min-width:0}
.lv-name{font-family:var(--display);font-weight:700;font-size:18px}
.lv-name span{font-size:12px;color:var(--ink2);font-weight:500;font-family:var(--body)}
.lv-desc{font-size:12.5px;color:var(--ink2)}
.lv-note{font-size:11px;font-weight:600;margin-top:2px}
.lv-count{font-size:12px;color:var(--ink2);font-weight:600}

/* Lưới chủ đề */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tile{padding:13px;cursor:pointer;margin-bottom:0}
.tile-emoji{font-size:24px}
.tile-name{font-family:var(--display);font-weight:700;font-size:15px;line-height:1.2;margin-top:3px}
.tile-meta{font-size:11px;color:var(--ink2);margin-top:3px}

/* Bài học */
.topbar{display:flex;gap:10px;align-items:center;margin-bottom:8px}
.x{border:none;background:transparent;font-size:19px;cursor:pointer;color:var(--ink2);padding:0 4px}
.hearts{font-size:11px;color:var(--ink2);font-weight:600;white-space:nowrap}
.lesson-title{font-size:11px;color:var(--ink2);font-weight:600;margin-bottom:10px;text-align:center}
.exercise{min-height:230px}
.big-emoji{font-size:54px;text-align:center;margin:12px 0 2px}
.huge-emoji{font-size:104px;line-height:1.1;margin:8px 0}
.exercise.kid .big-emoji{font-size:76px}
.exercise.kid .opt{font-size:19px;padding:16px 14px}
.exercise.kid .prompt-big{font-size:30px}
.prompt-big{font-family:var(--display);font-weight:700;font-size:24px;text-align:center;line-height:1.45;margin-bottom:6px}
.linkish{border:none;background:transparent;color:var(--ink);cursor:pointer;width:100%}
.blank{color:var(--mango);border-bottom:3px solid var(--mango)}
.gpoint{font-size:11px;color:var(--ink2);font-weight:600;text-align:center;margin:12px 0 8px}
.speaker{border:none;background:var(--ink);color:#fff;width:90px;height:90px;border-radius:30px;font-size:36px;cursor:pointer;box-shadow:0 5px 0 #0E1740;margin:14px 0}
.speaker:active{transform:translateY(2px);box-shadow:0 3px 0 #0E1740}

.options{display:grid;gap:8px;margin-top:16px}
.opt{
  text-align:left;font-family:var(--body);font-weight:500;font-size:15.5px;background:#fff;color:var(--ink);
  border:2px solid var(--line);border-radius:14px;padding:12px 14px;cursor:pointer;line-height:1.4;
}
.opt.sel{background:var(--sky);border-color:var(--ink)}
.opt.right{background:#E8F8F0;border-color:var(--leaf);color:#12784E}
.opt.wrong{background:#FDECEF;border-color:var(--lychee);color:#A82C46}
.opt:disabled{cursor:default}

.passage{background:var(--sky);border-radius:14px;padding:14px;margin:12px 0;font-size:14.5px;line-height:1.65}
.passage p{margin:0}
.passage-head{font-family:var(--display);font-weight:700;display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px}
.mini{border:none;background:#fff;border-radius:10px;padding:4px 9px;cursor:pointer;font-size:12px;font-family:var(--body);white-space:nowrap}
.q{font-family:var(--display);font-weight:700;margin-top:12px;font-size:16px}

.feedback{border-radius:16px;padding:14px;margin-bottom:10px}
.feedback.ok{background:#E8F8F0;border:1px solid var(--leaf)}
.feedback.no{background:#FDECEF;border:1px solid var(--lychee)}
.fb-title{font-family:var(--display);font-weight:800;font-size:17px}
.feedback.ok .fb-title{color:#12784E}
.feedback.no .fb-title{color:#A82C46}
.fb-body{font-size:13px;color:var(--ink2);margin-top:3px;line-height:1.5}
.notice{font-size:13px;color:var(--ink2);background:var(--sky);border-radius:12px;padding:12px;line-height:1.55}

/* Micro */
.mic{border:none;width:92px;height:92px;border-radius:30px;font-size:38px;cursor:pointer;color:#fff;background:var(--ink);box-shadow:0 6px 0 #0E1740}
.mic.listening{background:var(--lychee);box-shadow:none}
.mic:active:not(.listening){transform:translateY(2px);box-shadow:0 4px 0 #0E1740}
.mic-hint{font-size:12px;color:var(--ink2);margin-top:10px;font-weight:600}
.mic-hint.live{color:var(--lychee)}
.hintlink{border:none;background:transparent;color:var(--ink2);font-size:13px;cursor:pointer;font-family:var(--body);text-decoration:underline;margin:6px 0 16px}
.score{font-family:var(--display);font-weight:800;font-size:46px;margin:6px 0}
.heard{font-size:12px;color:var(--ink2);background:var(--sky);border-radius:10px;padding:8px 10px;display:inline-block;margin-top:8px}
.streak{font-size:12px;font-weight:700;color:var(--mango)}

/* Vườn trí nhớ */
.plots{display:flex;flex-wrap:wrap;gap:7px}
.plot{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;font-size:14px}
.table-card{padding:0;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:var(--sky);text-align:left;padding:9px 10px;font-size:11px;font-weight:600}
td{padding:8px 10px;border-top:1px solid var(--line)}

/* Ô chữ */
.cw-wrap{overflow-x:auto;display:flex;justify-content:center}
.cw{display:grid;gap:2px;justify-content:center}
.cw-void{width:var(--cw);height:var(--cw)}
.cw-cell{position:relative;width:var(--cw);height:var(--cw)}
.cw-num{position:absolute;top:0;left:2px;font-size:8px;font-weight:700;color:var(--ink2);z-index:1;pointer-events:none}
.cw-cell input{
  width:100%;height:100%;text-align:center;font-family:var(--display);font-weight:700;
  font-size:calc(var(--cw) * .5);border:1.5px solid var(--line);border-radius:5px;
  background:#fff;color:var(--ink);padding:0;text-transform:uppercase;
}
.cw-cell.right input{background:#E8F8F0;border-color:var(--leaf);color:#12784E}
.cw-cell.wrong input{background:#FDECEF;border-color:var(--lychee);color:#A82C46}
.clue-group{margin-top:10px}
.clue-head{font-family:var(--display);font-weight:700;font-size:14px;margin-bottom:4px}
.clue{font-size:13.5px;padding:3px 0;display:flex;gap:6px}
.clue b{min-width:16px}
.clue i{color:var(--ink2);font-size:11px;font-style:normal}
.clue.ok{color:var(--leaf)}
.clue.miss{color:var(--ink2)}

/* Lật thẻ */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mcard{
  height:86px;border-radius:14px;cursor:pointer;border:2px solid var(--line);background:var(--ink);
  color:var(--ink);font-family:var(--body);font-weight:500;font-size:13.5px;padding:6px;line-height:1.25;
  transition:background .15s;
}
.mcard.en{font-family:var(--display);font-weight:700}
.mcard.open{background:#fff;border-color:var(--ink)}
.mcard.done{background:#E8F8F0;border-color:var(--leaf);color:#12784E;cursor:default}
.mcard-back{font-size:26px}

/* Điều hướng dưới */
#nav{
  position:fixed;bottom:0;left:0;right:0;display:flex;background:#fff;border-top:1px solid var(--line);
  padding:8px 0 max(8px, env(safe-area-inset-bottom));z-index:40;
}
.tab{
  flex:1;border:none;background:transparent;cursor:pointer;font-family:var(--body);font-weight:600;
  font-size:11px;color:var(--ink2);display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;
}
.tab span{font-size:20px;filter:grayscale(1);opacity:.55}
.tab.on{color:var(--ink)}
.tab.on span{filter:none;opacity:1}

/* Toast */
#toast{
  position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(12px);
  background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;font-weight:600;
  z-index:60;max-width:92vw;text-align:center;opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Chuyển động */
@keyframes rise{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes ping{0%{box-shadow:0 0 0 0 rgba(232,80,110,.5)}100%{box-shadow:0 0 0 16px rgba(232,80,110,0)}}
.rise{animation:rise .22s ease-out}
.ping{animation:ping 1.2s infinite}
@media (prefers-reduced-motion:reduce){.rise,.ping{animation:none}}

@media (max-width:380px){
  h1{font-size:24px}
  .grid2{gap:8px}
  .tile-name{font-size:14px}
}

/* ===== Bài tập mở rộng ===== */
/* Điền chỗ trống trong đoạn văn */
.para-cloze{background:var(--sky);border-radius:14px;padding:14px;margin:12px 0;font-size:15px;line-height:2.1}
.para-blank{display:inline-block;min-width:64px;text-align:center;border-bottom:2px solid var(--ink2);padding:1px 8px;margin:0 2px;font-weight:600;font-family:var(--display)}
.para-blank.filled{background:#fff;border-radius:6px;border-bottom-color:var(--ink)}
.para-blank.right{background:#E8F8F0;border-radius:6px;border-bottom-color:var(--leaf);color:#12784E}
.para-blank.wrong{background:#FDECEF;border-radius:6px;border-bottom-color:var(--lychee);color:#A82C46}
.para-choices{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:8px}
.para-num{font-family:var(--display);font-weight:700;color:var(--ink2);min-width:18px}
.chip{font-family:var(--body);font-weight:500;font-size:14px;padding:7px 12px;border-radius:10px;border:1.5px solid var(--line);background:#fff;color:var(--ink);cursor:pointer}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* Nghe hội thoại */
.dlg-play{text-align:center;margin:12px 0}
.dlg-script{background:var(--sky);border-radius:12px;padding:12px;margin:10px 0;font-size:13.5px;line-height:1.7}
.dlg-script div{margin-bottom:3px}
.dlg-q{font-family:var(--display);font-weight:700;font-size:15px;margin:14px 0 6px}

/* Chính tả */
.dict-input{margin-top:14px;width:100%;max-width:320px;text-align:center;font-family:var(--display);font-weight:700;font-size:22px;border:2px solid var(--line);border-radius:14px;padding:12px;color:var(--ink);outline-color:var(--mango)}
.dict-input:disabled{background:var(--sky)}

/* Xếp chữ cái */
.scramble-slots{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:18px 0}
.slot{width:34px;height:42px;border-bottom:3px solid var(--ink2);display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:22px;color:var(--ink)}
.slot.right{border-bottom-color:var(--leaf);color:#12784E}
.slot.wrong{border-bottom-color:var(--lychee);color:#A82C46}
.scramble-bank{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0}
.tile-letter{width:42px;height:48px;border-radius:12px;border:2px solid var(--line);background:#fff;color:var(--ink);font-family:var(--display);font-weight:800;font-size:22px;cursor:pointer;box-shadow:0 3px 0 var(--shadow)}
.tile-letter:active:not(.used){transform:translateY(2px);box-shadow:0 1px 0 var(--shadow)}
.tile-letter.used{background:var(--sky);color:transparent;box-shadow:none;border-style:dashed}
.mini-clear{display:block;margin:0 auto;border:none;background:transparent;color:var(--ink2);font-family:var(--body);font-size:13px;cursor:pointer;text-decoration:underline}

</style>
</head>
<body>
<main id="app"></main>
<nav id="nav" aria-label="Điều hướng chính"></nav>
<div id="toast" role="status" aria-live="polite"></div>
<script>
/* ---------- DỮ LIỆU (trích từ vuon-tu-v2.jsx & readings-full.js) ---------- */
const T = (id, level, name, emoji, words) => ({ id, level, name, emoji, words });
const G = (level, point, q, opts, a, why) => ({ level, point, q, opts, a, why });
const R = (topicId, level, title, text, qs) => ({ topicId, level, title, text, qs });
const TOPICS = [
  /* ===== CẤP 1 — MẦM (Pre-A1) ===== */
  T(1, 1, "Chào hỏi", "👋", [["hello", "xin chào"], ["bye", "tạm biệt"], ["yes", "vâng / có"], ["no", "không"], ["hi", "chào"]]),
  T(2, 1, "Bảng chữ cái", "🔤", [["letter", "chữ cái"], ["A is for apple", "A là quả táo"], ["B is for ball", "B là quả bóng"], ["C is for cat", "C là con mèo"], ["D is for dog", "D là con chó"]]),
  T(3, 1, "Số 1–10", "🔢", [["one", "một"], ["three", "ba"], ["five", "năm"], ["eight", "tám"], ["ten", "mười"]]),
  T(4, 1, "Màu sắc", "🎨", [["red", "màu đỏ"], ["blue", "màu xanh dương"], ["green", "màu xanh lá"], ["yellow", "màu vàng"], ["black", "màu đen"]]),
  T(5, 1, "Hình khối", "🔺", [["circle", "hình tròn"], ["square", "hình vuông"], ["triangle", "hình tam giác"], ["star", "ngôi sao"], ["heart", "hình trái tim"]]),
  T(6, 1, "Gia đình", "👨‍👩‍👧", [["mother", "mẹ"], ["father", "bố"], ["sister", "chị / em gái"], ["brother", "anh / em trai"], ["baby", "em bé"]]),
  T(7, 1, "Cơ thể", "🖐️", [["head", "cái đầu"], ["hand", "bàn tay"], ["eye", "con mắt"], ["nose", "cái mũi"], ["foot", "bàn chân"]]),
  T(8, 1, "Vật nuôi", "🐶", [["dog", "con chó"], ["cat", "con mèo"], ["fish", "con cá"], ["bird", "con chim"], ["rabbit", "con thỏ"]]),
  T(9, 1, "Động vật nông trại", "🐄", [["cow", "con bò"], ["pig", "con lợn"], ["duck", "con vịt"], ["buffalo", "con trâu"], ["chicken", "con gà"]]),
  T(10, 1, "Thú hoang dã", "🦁", [["lion", "sư tử"], ["elephant", "con voi"], ["monkey", "con khỉ"], ["tiger", "con hổ"], ["bear", "con gấu"]]),
  T(11, 1, "Trái cây", "🍎", [["apple", "quả táo"], ["banana", "quả chuối"], ["mango", "quả xoài"], ["orange", "quả cam"], ["grape", "quả nho"]]),

  G(3, "Can / can't", "I ___ swim, but I can't dive.", ["can", "could", "must", "should"], "can", "“can” diễn tả khả năng ở hiện tại."),
  G(3, "Tương lai – be going to", "It's cloudy. It ___ rain.", ["will", "is going to", "would", "goes to"], "is going to", "Có dấu hiệu hiện tại → “be going to” cho dự đoán."),
  G(3, "Trạng từ tần suất", "She ___ arrives late.", ["never", "not never", "no", "never not"], "never", "Trạng từ tần suất đứng trước động từ thường."),

  G(4, "Câu bị động", "The report ___ yesterday.", ["submitted", "was submitted", "is submitted", "has submit"], "was submitted", "Bị động quá khứ: was/were + V3."),

  G(4, "Câu điều kiện loại 2", "If I ___ you, I would accept the offer.", ["am", "was", "were", "will be"], "were", "Loại 2 giả định: “If I were you” là chuẩn."),
  G(4, "Mệnh đề quan hệ", "The colleague ___ helped me has resigned.", ["which", "who", "whose", "whom"], "who", "Chủ ngữ chỉ người → “who”."),
  G(4, "Câu tường thuật", "He said he ___ busy that day.", ["is", "was", "will be", "has been"], "was", "Tường thuật lùi thì: is → was."),
  G(4, "Động từ khuyết thiếu – suy đoán", "She ___ be at the meeting; her car is outside.", ["must", "can't", "might not", "shouldn't"], "must", "Bằng chứng chắc chắn → “must be” (chắc hẳn là)."),
  G(4, "Gerund vs Infinitive", "I'm considering ___ the deadline.", ["to extend", "extending", "extend", "extended"], "extending", "“consider” đi với V-ing."),
  G(4, "Used to", "I ___ commute by motorbike.", ["used to", "use to", "am used to", "was use to"], "used to", "Thói quen quá khứ nay không còn: “used to + V”."),
  G(4, "Quá khứ tiếp diễn", "While I ___, the phone rang.", ["cook", "cooked", "was cooking", "have cooked"], "was cooking", "Hành động đang diễn ra thì bị cắt ngang → quá khứ tiếp diễn."),
  G(4, "So sánh với as...as", "This route is not ___ as the old one.", ["as fast", "so faster", "fast as", "as faster"], "as fast", "Cấu trúc: not as + adj + as."),
  G(4, "Cụm động từ", "We need to ___ the meeting until Friday.", ["put off", "put on", "put up", "put out"], "put off", "“put off” = hoãn lại."),
  // B2
  G(5, "Điều kiện loại 3", "If they ___ the risk, they wouldn't have signed.", ["knew", "had known", "would know", "know"], "had known", "Loại 3 (tiếc nuối quá khứ): If + had + V3, would have + V3."),
  G(5, "Điều kiện hỗn hợp", "If she had studied law, she ___ a judge now.", ["would be", "would have been", "will be", "was"], "would be", "Điều kiện hỗn hợp: quá khứ giả định → kết quả ở hiện tại."),
  G(5, "Đảo ngữ nhấn mạnh", "Not only ___ the deadline, but he also cut costs.", ["he met", "did he meet", "he did meet", "met he"], "did he meet", "“Not only” đầu câu → đảo ngữ: trợ động từ trước chủ ngữ."),
  G(5, "Wish / If only", "I wish I ___ more time to prepare.", ["have", "had", "will have", "would had"], "had", "Ước ở hiện tại → lùi một thì: “wish + past simple”."),
  G(5, "Bị động với động từ tường thuật", "The contract ___ to have been amended.", ["is believed", "believes", "believing", "believed"], "is believed", "Cấu trúc: S + is believed/said + to have V3."),

  G(5, "Rút gọn mệnh đề quan hệ", "The bidders ___ for clarification received a reply.", ["asked", "asking", "who asking", "which asked"], "asking", "Rút gọn mệnh đề chủ động: who asked → asking."),
  G(5, "Câu giả định (subjunctive)", "The board demanded that he ___ present.", ["is", "be", "was", "will be"], "be", "Sau demand/require/insist that → động từ nguyên thể không “to”."),
  G(5, "Trật tự tính từ", "She bought a ___ table.", ["wooden round large", "large round wooden", "round large wooden", "wooden large round"], "large round wooden", "Trật tự: kích thước → hình dáng → chất liệu."),
  G(5, "Cấu trúc nhấn mạnh (cleft)", "___ we need is a clearer specification.", ["That", "What", "Which", "It"], "What", "Câu chẻ: “What + mệnh đề + is/are + …”."),
  G(5, "Hàm ý & sắc thái modal", "You ___ have told me earlier — I could have helped.", ["should", "must", "can", "will"], "should", "“should have + V3” = đáng lẽ phải (trách móc quá khứ)."),
  G(5, "Liên từ mức độ cao", "The estimate was rejected; ___, the tender was re-issued.", ["moreover", "consequently", "nevertheless", "meanwhile"], "consequently", "Quan hệ nhân–quả → “consequently”."),
