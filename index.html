  DIALOGUES.forEach((d) => ITEMS.push({ id: d.id, kind: "dialogue", data: d, topic: d.topic, level: d.level, emoji: "🎧" }));

const ITEM_BY_ID = {};
ITEMS.forEach((i) => (ITEM_BY_ID[i.id] = i));
const TOPIC_BY_ID = {};
TOPICS.forEach((t) => (TOPIC_BY_ID[t.id] = t));

const shuffle = (a) => { const x = a.slice(); for (let i = x.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); const s = x[i]; x[i] = x[j]; x[j] = s; } return x; };

/* Index từ vựng để chọn mồi nhử nhanh (tránh filter toàn bộ ITEMS mỗi câu) */
const WORDS_BY_TOPIC = {};
const WORDS_BY_LEVEL = {};
ITEMS.forEach((i) => {
  if (i.kind !== "word") return;
  (WORDS_BY_TOPIC[i.topic] = WORDS_BY_TOPIC[i.topic] || []).push(i);
  (WORDS_BY_LEVEL[i.level] = WORDS_BY_LEVEL[i.level] || []).push(i);
});

/* ---------- Bộ chọn bài thích ứng ----------
   Ưu tiên item mới, rồi item có R gần ngưỡng 0.85 (vùng phát triển gần)
------------------------------------------------ */
const TARGET_R = 0.85;

function buildLesson(topicId, mem, now) {
  const t = TOPIC_BY_ID[topicId];
  const L = lvl(t.level);
  // Cấp 1–2: chỉ lấy tối đa 12 từ mỗi buổi (kho 25 từ là quá dài cho trẻ)
  let words = ITEMS.filter((i) => i.kind === "word" && i.topic === topicId);
  const pool = t.level <= 2 ? pickWordsForKids(words, mem, now, 12) : words.slice();

  if (L.skills.indexOf("grammar") >= 0) {
    pool.push.apply(pool, shuffle(ITEMS.filter((i) => i.kind === "grammar" && i.level === t.level)).slice(0, 3));
    // điền chỗ trống trong câu (theo chủ đề nếu có, nếu không lấy theo cấp)
    const csTopic = ITEMS.filter((i) => i.kind === "clozeSent" && i.topic === topicId);
    const csLevel = shuffle(ITEMS.filter((i) => i.kind === "clozeSent" && i.level === t.level));
    pool.push.apply(pool, (csTopic.length ? csTopic : csLevel).slice(0, 2));
  }
  if (L.skills.indexOf("read") >= 0) {
    pool.push.apply(pool, ITEMS.filter((i) => i.kind === "read" && i.topic === topicId));
    pool.push.apply(pool, ITEMS.filter((i) => i.kind === "clozePara" && i.topic === topicId));
  }
  // nghe hội thoại: có từ cấp 2 trở lên
  if (t.level >= 2)
    pool.push.apply(pool, ITEMS.filter((i) => i.kind === "dialogue" && i.topic === topicId));

  return pool
    .map((it) => {
      const m = mem[it.id];
      const isNew = !m || m.reps === 0;
      return { it, key: isNew ? -1e9 : -Math.abs(retrievability(m, now) - TARGET_R) };
    })
    .sort((a, b) => a.key - b.key)
    .map((s) => s.it);
}

/* Trẻ em: ưu tiên từ chưa học, rồi từ sắp quên; giới hạn số lượng mỗi buổi */
function pickWordsForKids(words, mem, now, limit) {
  const fresh = words.filter((w) => !mem[w.id] || mem[w.id].reps === 0);
  const seen = words.filter((w) => mem[w.id] && mem[w.id].reps > 0)
    .sort((a, b) => retrievability(mem[a.id], now) - retrievability(mem[b.id], now));
  return shuffle(fresh).slice(0, limit - Math.min(seen.length, 4)).concat(seen.slice(0, 4));
}

function buildReviewQueue(mem, now, size) {
  size = size || 12;
  return Object.keys(mem)
    .map((id) => ({ it: ITEM_BY_ID[id], r: retrievability(mem[id], now) }))
    .filter((x) => x.it && x.r < 0.93)
    .sort((a, b) => a.r - b.r)
    .slice(0, size)
    .map((x) => x.it);
}

/* ---------- Sinh dạng bài tập ---------- */
function buildExercise(item, mem, kid) {
  if (item.kind === "grammar")    return { type: "fill", item: item, options: shuffle(item.opts) };
  if (item.kind === "read")       return { type: "read", item: item, options: shuffle(item.opts) };
  if (item.kind === "clozeSent")  return { type: "clozeSent", item: item, options: shuffle([item.data.answer].concat(item.data.distractors)) };
  if (item.kind === "clozePara")  return { type: "clozePara", item: item };
  if (item.kind === "dialogue")   return { type: "dialogue", item: item };

  const reps = (mem[item.id] && mem[item.id].reps) || 0;
  // Cấp 1–2 (trẻ em): nghe, chọn nghĩa, phát âm, xếp chữ (không đánh máy chính tả)
  // Cấp 3+: thêm chính tả (nghe → gõ lại)
  const modes = kid
    ? ["listen", "viToEn", "speak", "enToVi", "scramble"]
    : ["viToEn", "listen", "enToVi", "speak", "dictation", "scramble"];
  const mode = reps === 0 ? (kid ? "listen" : "viToEn") : modes[reps % modes.length];
  if (mode === "speak")      return { type: "speak", item: item };
  if (mode === "dictation")  return { type: "dictation", item: item };
  if (mode === "scramble")   return buildScramble(item);

  const same  = shuffle((WORDS_BY_TOPIC[item.topic] || []).filter((i) => i.id !== item.id)).slice(0, 3);
  const other = shuffle((WORDS_BY_LEVEL[item.level] || []).filter((i) => i.id !== item.id)).slice(0, 6);
  const seen = {}; const opts = [];
  same.concat(other).forEach((o) => {
    if (opts.length < 3 && !seen[o.id] && o.vi !== item.vi && o.en !== item.en) { seen[o.id] = 1; opts.push(o); }
  });
  return { type: mode, item: item, options: shuffle([item].concat(opts)) };
}

/* Xếp chữ cái: chỉ áp dụng cho từ đơn ≤ 9 chữ cái; nếu không, lùi về chọn nghĩa */
function buildScramble(item) {
  const word = item.en;
  if (!/^[A-Za-z]{2,9}$/.test(word)) {
    const same = shuffle((WORDS_BY_TOPIC[item.topic] || []).filter((i) => i.id !== item.id)).slice(0, 3);
    const other = shuffle((WORDS_BY_LEVEL[item.level] || []).filter((i) => i.id !== item.id)).slice(0, 6);
    const seen = {}; const opts = [];
    same.concat(other).forEach((o) => { if (opts.length < 3 && !seen[o.id] && o.en !== item.en) { seen[o.id] = 1; opts.push(o); } });
    return { type: "viToEn", item: item, options: shuffle([item].concat(opts)) };
  }
  let letters = shuffle(word.split(""));
  for (let tries = 0; tries < 8 && letters.join("") === word; tries++) letters = shuffle(word.split(""));
  return { type: "scramble", item: item, letters: letters };
}

/* ---------- Bộ sinh ô chữ ----------
   Greedy + thử nhiều thứ tự; kiểm tra ràng buộc kề cạnh để không tạo "từ ma"
------------------------------------------------ */
const CW_SIZE = 13;

function cwCanPlace(grid, word, r, c, dir) {
  const L = word.length;
  const dr = dir === "V" ? 1 : 0, dc = dir === "H" ? 1 : 0;
  if (r < 0 || c < 0) return null;
  if (r + dr * (L - 1) >= CW_SIZE || c + dc * (L - 1) >= CW_SIZE) return null;
  const br = r - dr, bc = c - dc;
  if (br >= 0 && bc >= 0 && grid[br][bc]) return null;
  const ar = r + dr * L, ac = c + dc * L;
  if (ar < CW_SIZE && ac < CW_SIZE && grid[ar][ac]) return null;

  let cross = 0;
  for (let i = 0; i < L; i++) {
    const rr = r + dr * i, cc = c + dc * i;
    const cell = grid[rr][cc];
    if (cell) {
      if (cell !== word[i]) return null;
      cross++;
    } else {
      const sides = dir === "H" ? [[rr - 1, cc], [rr + 1, cc]] : [[rr, cc - 1], [rr, cc + 1]];
      for (let k = 0; k < 2; k++) {
        const sr = sides[k][0], sc = sides[k][1];
        if (sr >= 0 && sr < CW_SIZE && sc >= 0 && sc < CW_SIZE && grid[sr][sc]) return null;
      }
    }
  }
  return cross;
}

function cwTryBuild(words) {
  const grid = [];
  for (let i = 0; i < CW_SIZE; i++) grid.push(new Array(CW_SIZE).fill(null));
  const placed = [];
  const put = (e, r, c, dir) => {
    const dr = dir === "V" ? 1 : 0, dc = dir === "H" ? 1 : 0;
    for (let i = 0; i < e.w.length; i++) grid[r + dr * i][c + dc * i] = e.w[i];
    placed.push(Object.assign({}, e, { r, c, dir }));
  };
  const first = words[0];
  put(first, Math.floor(CW_SIZE / 2), Math.floor((CW_SIZE - first.w.length) / 2), "H");

  for (let k = 1; k < words.length; k++) {
    const e = words[k];
    let best = null;
    for (let pi = 0; pi < placed.length; pi++) {
      const p = placed[pi];
      for (let i = 0; i < p.w.length; i++)
        for (let j = 0; j < e.w.length; j++) {
          if (p.w[i] !== e.w[j]) continue;
          const dir = p.dir === "H" ? "V" : "H";
          const pr = p.r + (p.dir === "V" ? i : 0);
          const pc = p.c + (p.dir === "H" ? i : 0);
          const r = dir === "V" ? pr - j : pr;
          const c = dir === "H" ? pc - j : pc;
          const cross = cwCanPlace(grid, e.w, r, c, dir);
          if (cross === null || cross < 1) continue;
          const dist = Math.abs(r - CW_SIZE / 2) + Math.abs(c - CW_SIZE / 2);
          const score = cross * 100 - dist;
          if (!best || score > best.score) best = { r, c, dir, score };
        }
    }
    if (best) put(e, best.r, best.c, best.dir);
  }
  if (placed.length < 3) return null;

  let r0 = CW_SIZE, c0 = CW_SIZE, r1 = 0, c1 = 0;
  for (let r = 0; r < CW_SIZE; r++)
    for (let c = 0; c < CW_SIZE; c++)
      if (grid[r][c]) { r0 = Math.min(r0, r); c0 = Math.min(c0, c); r1 = Math.max(r1, r); c1 = Math.max(c1, c); }
  const H = r1 - r0 + 1, Wd = c1 - c0 + 1;
  const cut = [];
  for (let r = 0; r < H; r++) { const row = []; for (let c = 0; c < Wd; c++) row.push(grid[r + r0][c + c0]); cut.push(row); }
  const clues = placed.map((p) => Object.assign({}, p, { r: p.r - r0, c: p.c - c0 }));

  const nums = {}; let n = 0;
  clues.sort((a, b) => a.r - b.r || a.c - b.c).forEach((p) => {
    const key = p.r + "," + p.c;
    if (!(key in nums)) nums[key] = ++n;
    p.num = nums[key];
  });
  return { grid: cut, clues, nums, H, W: Wd };
}

function makeCrossword(entries, attempts) {
  attempts = attempts || 40;
  const valid = entries
    .map((e) => Object.assign({}, e, { w: e.en.toLowerCase() }))
    .filter((e) => /^[a-z]{3,9}$/.test(e.w));
  if (valid.length < 3) return null;

  let best = null;
  for (let a = 0; a < attempts; a++) {
    let order;
    if (a === 0) order = valid.slice().sort((x, y) => y.w.length - x.w.length);
    else {
      const s = shuffle(valid);
      const longest = s.slice().sort((x, y) => y.w.length - x.w.length)[0];
      order = [longest].concat(s.filter((x) => x !== longest));
    }
    const r = cwTryBuild(order.slice(0, 8));
    if (r && (!best || r.clues.length > best.clues.length)) best = r;
    if (best && best.clues.length === Math.min(valid.length, 8)) break;
  }
  return best;
}

/* ---------- Chấm phát âm: Levenshtein trên chuỗi chuẩn hoá ---------- */
function similarity(a, b) {
  const norm = (s) => String(s).toLowerCase().replace(/[^a-z ]/g, "").trim();
  a = norm(a); b = norm(b);
  if (!a || !b) return 0;
  const dp = [];
  for (let i = 0; i <= a.length; i++) { dp.push(new Array(b.length + 1).fill(0)); dp[i][0] = i; }
  for (let j = 0; j <= b.length; j++) dp[0][j] = j;
  for (let i = 1; i <= a.length; i++)
    for (let j = 1; j <= b.length; j++)
      dp[i][j] = Math.min(dp[i-1][j] + 1, dp[i][j-1] + 1, dp[i-1][j-1] + (a[i-1] === b[j-1] ? 0 : 1));
  return 1 - dp[a.length][b.length] / Math.max(a.length, b.length);
}

  if (ex.type !== "speak" && ex.type !== "clozePara" && ex.type !== "dialogue" && ex.type !== "dictation" && ex.type !== "scramble") {
    h += '<div class="options">';
    ex.options.forEach((o) => {
      const isText = ex.type === "fill" || ex.type === "read" || ex.type === "clozeSent";
      const val = isText ? o : o.id;
      const label = isText ? o : ex.type === "enToVi" ? o.vi : o.emoji + " " + o.en;
      const correct = ex.type === "clozeSent" ? it.data.answer : (isText ? it.a : it.id);
      let cls = "opt";
      if (st.result) {
        if (val === correct) cls += " right";
        else if (st.picked === val) cls += " wrong";
      } else if (st.picked === val) cls += " sel";
      h += '<button class="' + cls + '" data-act="pick" data-arg="' + esc(val) + '"' + (st.result ? " disabled" : "") + ">" + esc(label) + "</button>";
    });
    h += "</div>";
  }
  h += "</section>";

  if (st.result) {
    const ok = st.result === "ok";
    let why = "";
    if (ex.type === "fill") why = esc(it.why);
    else if (ex.type === "clozeSent") why = esc(it.data.why);
    else if (ex.type === "read") why = "Đáp án: <b>" + esc(it.a) + "</b>";
    else if (ex.type === "clozePara") why = clozeParaAnswers(it);
    else if (ex.type === "dialogue") why = dialogueAnswers(it);
    else if (ex.type === "dictation") why = "Đáp án: <b>" + esc(it.en) + "</b> = " + esc(it.vi) + " · Độ khớp " + Math.round((st.dictScore || 0) * 100) + "%";
    else if (ex.type === "scramble") why = "<b>" + esc(it.en) + "</b> = " + esc(it.vi);
    else why = "<b>" + esc(it.en) + "</b> = " + esc(it.vi);
    h += '<div class="feedback ' + (ok ? "ok" : "no") + '"><div class="fb-title">' + (ok ? "Chuẩn luôn! 🌱" : "Chưa đúng") + "</div><div class=\"fb-body\">" + why + "</div></div>";
  }

  let ready;
  if (ex.type === "speak") ready = false;
  else if (ex.type === "clozePara") ready = st.paraPicked && Object.keys(st.paraPicked).length === it.data.blanks.length;
  else if (ex.type === "dialogue") ready = st.dlgPicked && Object.keys(st.dlgPicked).length === it.data.qs.length;
  else if (ex.type === "dictation") ready = (st.dictInput || "").trim().length > 0;
  else if (ex.type === "scramble") ready = (st.scrambleBuilt || []).length === it.en.length;
  else ready = st.picked !== null;

  if (st.result)
    h += '<button class="btn ' + (st.result === "ok" ? "btn-leaf" : "btn-lychee") + '" data-act="next">Tiếp tục</button>';
  else if (ex.type !== "speak")
    h += '<button class="btn btn-leaf" data-act="check"' + (ready ? "" : " disabled") + ">Kiểm tra</button>";
  return h;
}

/* ---- View: điền chỗ trống trong đoạn văn ---- */
function viewClozePara(it) {
  const d = it.data;
  st.paraPicked = st.paraPicked || {};
  // tách đoạn văn theo {n}, chèn ô chọn
  let html = '<div class="para-cloze">';
  const segs = d.text.split(/(\{\d+\})/);
  segs.forEach((seg) => {
    const m = seg.match(/^\{(\d+)\}$/);
    if (m) {
      const bi = +m[1];
      const picked = st.paraPicked[bi];
      let cls = "para-blank";
      if (st.result) cls += (st.paraResults && st.paraResults[bi]) ? " right" : " wrong";
      else if (picked) cls += " filled";
      html += '<span class="' + cls + '">' + (picked ? esc(picked) : "____") + "</span>";
    } else html += esc(seg);
  });
  html += "</div>";
  // các nhóm lựa chọn cho từng chỗ trống
  if (!st.result) {
    d.blanks.forEach((b, bi) => {
      const on = st.paraPicked[bi];
      html += '<div class="para-choices"><span class="para-num">' + (bi + 1) + ".</span>";
      b.opts.forEach((o) => {
        html += '<button class="chip' + (on === o ? " on" : "") + '" data-act="para-pick" data-arg="' + bi + "|" + esc(o) + '">' + esc(o) + "</button>";
      });
      html += "</div>";
    });
  }
  return html;
}
function clozeParaAnswers(it) {
  return it.data.blanks.map((b, i) => (i + 1) + ". <b>" + esc(b.a) + "</b>").join(" · ");
}

/* ---- View: nghe hội thoại và trả lời ---- */
function viewDialogue(it) {
  const d = it.data;
  st.dlgPicked = st.dlgPicked || {};
  const script = d.lines.map((l) => (l.s ? l.s + ": " : "") + l.t).join(" ");
  let html = '<div class="dlg-play"><button class="btn btn-ghost" data-act="say-dialogue" data-arg="' + esc(it.id) + '">🎧 Nghe hội thoại</button>';
  html += '<div class="muted" style="margin-top:6px;font-size:11px">Nghe rồi trả lời. Có thể nghe lại nhiều lần.</div></div>';
  // sau khi trả lời, hiện lời thoại để đối chiếu
  if (st.result) {
    html += '<div class="dlg-script">';
    d.lines.forEach((l) => { html += '<div><b>' + esc(l.s) + ":</b> " + esc(l.t) + "</div>"; });
    html += "</div>";
  }
  d.qs.forEach((q, qi) => {
    const on = st.dlgPicked[qi];
    html += '<div class="dlg-q">' + esc(q.q) + "</div><div class=\"options\">";
    q.opts.forEach((o) => {
      let cls = "opt";
      if (st.result) {
        if (o === q.a) cls += " right";
        else if (on === o) cls += " wrong";
      } else if (on === o) cls += " sel";
      html += '<button class="' + cls + '" data-act="dlg-pick" data-arg="' + qi + "|" + esc(o) + '"' + (st.result ? " disabled" : "") + ">" + esc(o) + "</button>";
    });
    html += "</div>";
  });
  return html;
}
function dialogueAnswers(it) {
  return it.data.qs.map((q, i) => (i + 1) + ". <b>" + esc(q.a) + "</b>").join(" · ");
}

/* ---- View: chính tả (nghe → gõ lại) ---- */
function viewDictation(it) {

/* ---- View: xếp chữ cái ---- */
function viewScramble(it) {

}

/* ---------- Vườn trí nhớ ---------- */
function viewGarden() {
  const rows = Object.keys(st.mem)
    .map((id) => ({ id, item: ITEM_BY_ID[id], r: retrievability(st.mem[id], st.now), S: st.mem[id].S, D: st.mem[id].D, due: nextInterval(st.mem[id].S) }))
    .filter((x) => x.item)
    .sort((a, b) => a.r - b.r);

  let h = statusBar();
  h += '<section class="card"><div class="eyebrow">Vườn trí nhớ</div><h2>Sức khoẻ từng mục, ngay lúc này</h2>' +
    '<p class="muted"><b>R</b> = xác suất bạn còn nhớ nếu bị hỏi ngay bây giờ. <b>S</b> = độ bền (số ngày để R rơi về 90%).</p></section>';

  if (!rows.length) {
    h += '<section class="card center pad"><p class="muted">Vườn còn trống. Học một bài rồi quay lại đây.</p>' +
      '<button class="btn" data-act="tab" data-arg="map">Bắt đầu học</button></section>';
    return h;
  }

  h += '<section class="card"><div class="plots">';
  rows.forEach((r) => {
    const g = Math.round(r.r * 100);
    const label = (r.item.en || r.item.point || "Đọc hiểu") + " · R=" + g + "%";
    h += '<div class="plot" title="' + esc(label) + '" style="background:color-mix(in srgb, var(--leaf) ' + g + '%, #F3D9DF);opacity:' + (0.4 + r.r * 0.6) + '">' + (r.item.emoji || "📐") + "</div>";
  });
  h += "</div></section>";

  h += '<section class="card table-card"><table><thead><tr><th>Mục</th><th>R</th><th>S (ngày)</th><th>Khó</th><th>Ôn sau</th></tr></thead><tbody>';
  rows.slice(0, 80).forEach((r) => {
    h += "<tr><td><b>" + (r.item.emoji || "📐") + " " + esc(r.item.en || r.item.point || "Đọc hiểu") + "</b></td>" +
      '<td class="' + (r.r < 0.85 ? "lychee" : "leaf") + '"><b>' + Math.round(r.r * 100) + "%</b></td>" +
      "<td>" + r.S.toFixed(1) + "</td><td>" + r.D.toFixed(1) + "</td>" +
      '<td class="muted">' + (r.due < 1 ? "hôm nay" : Math.round(r.due) + " ngày") + "</td></tr>";
  });
  h += "</tbody></table></section>";
  return h;
}

/* ---------- Trò 1: Nhìn hình & phát âm ---------- */
function startGameSpeak(topicId) {

  st.topic = topicId;
  st.gameState = {
    deck: shuffle(t.words.map((w, i) => ({ key: "w" + t.id + "-" + i, en: w[0], vi: w[1], emoji: t.emoji }))),
    i: 0, total: 0, best: 0, streak: 0, listening: false, scored: false, score: 0, heard: "",
  };
  go("gspeak");
}
function viewGameSpeak() {
  const s = st.gameState, t = TOPIC_BY_ID[st.topic];
  if (s.i >= s.deck.length) {
    const avg = s.total / s.deck.length;
    return '<section class="card center pad"><div style="font-size:54px">' + (avg >= 0.8 ? "🎉" : avg >= 0.6 ? "👍" : "💪") + "</div>" +
      "<h2>Xong vòng phát âm</h2>" +

/* ---------- Trò 2: Ô chữ ---------- */
const CW_CACHE = {};
function cwFor(topicId) {
  if (!(topicId in CW_CACHE)) {
    const t = TOPIC_BY_ID[topicId];
    CW_CACHE[topicId] = makeCrossword(t.words.map((w) => ({ en: w[0], vi: w[1] })));
  }
  return CW_CACHE[topicId];
}
function startGameCross(topicId) {
  const puzzle = cwFor(topicId);
  if (!puzzle) { toast("Chủ đề này không dựng được ô chữ"); return; }
  st.topic = topicId;
  st.gameState = { puzzle, cells: {}, checked: false, solved: [] };
  go("gcross");
}
function viewGameCross() {
  const s = st.gameState, t = TOPIC_BY_ID[st.topic];
  const p = s.puzzle;
  const cell = Math.max(24, Math.min(34, Math.floor(320 / p.W)));

  let h = '<div class="topbar"><button class="x" data-act="tab" data-arg="games" aria-label="Thoát">✕</button>' +
    '<div class="bar"><div class="fill" style="width:' + (s.checked ? 100 : 0) + '%;background:var(--leaf)"></div></div>' +
    '<span class="hearts">' + p.clues.length + " từ</span></div>";
  h += '<div class="lesson-title">' + esc(t.name) + " · Ô chữ</div>";

  h += '<section class="card cw-wrap"><div class="cw" style="grid-template-columns:repeat(' + p.W + "," + cell + "px);--cw:" + cell + 'px">';
  for (let r = 0; r < p.H; r++)
    for (let c = 0; c < p.W; c++) {
      const sol = p.grid[r][c];
      const key = r + "," + c;
      if (!sol) { h += '<div class="cw-void"></div>'; continue; }
      const val = (s.cells[key] || "").toUpperCase();
      const num = p.nums[key];
      let cls = "cw-cell";
      if (s.checked) cls += (s.cells[key] || "") === sol ? " right" : " wrong";
      h += '<div class="' + cls + '">' + (num ? '<span class="cw-num">' + num + "</span>" : "") +
        '<input maxlength="1" inputmode="text" autocapitalize="characters" data-cw="' + key + '" value="' + val + '"' + (s.checked ? " disabled" : "") + "></div>";
    }
  h += "</div></section>";

  h += '<section class="card"><div class="eyebrow">Gợi ý</div>';
  ["H", "V"].forEach((d) => {
    const list = p.clues.filter((x) => x.dir === d);
    if (!list.length) return;
    h += '<div class="clue-group"><div class="clue-head">' + (d === "H" ? "Hàng ngang →" : "Hàng dọc ↓") + "</div>";
    list.forEach((x) => {
      const ok = s.solved.indexOf(x.w) >= 0;
      h += '<div class="clue' + (s.checked ? (ok ? " ok" : " miss") : "") + '"><b>' + x.num + ".</b><span>" + esc(x.vi) +
        ' <i>(' + x.w.length + " chữ)</i>" + (s.checked && !ok ? ' <b class="lychee">→ ' + x.w + "</b>" : "") + "</span></div>";
    });
    h += "</div>";
  });
  h += "</section>";

  if (s.checked) {
    const all = s.solved.length === p.clues.length;
    h += '<section class="card center" style="padding:14px;' + (all ? "background:#E8F8F0" : "") + '"><b style="font-size:19px">' +
      s.solved.length + "/" + p.clues.length + " từ đúng " + (all ? "🎉" : "") + "</b></section>" +
      '<button class="btn" data-act="tab" data-arg="games">Về sảnh trò chơi</button>';
  } else {
    h += '<div class="row"><button class="btn btn-ghost" data-act="cw-reveal">Chịu thua</button>' +
      '<button class="btn btn-leaf" data-act="cw-check" style="flex:2">Kiểm tra</button></div>';
  }
  return h;
}
function wireDictation() {
  const inp = document.getElementById("dictInput");
  if (!inp) return;
  inp.addEventListener("input", function (e) { st.dictInput = e.target.value; });
  // Enter để kiểm tra nhanh
  inp.addEventListener("keydown", function (e) { if (e.key === "Enter" && (st.dictInput || "").trim()) checkAnswer(); });
}
function wireCrossword() {
  const s = st.gameState;
  document.querySelectorAll("[data-cw]").forEach((inp) => {
    inp.addEventListener("input", (e) => {
      const key = inp.getAttribute("data-cw");
      const ch = String(e.target.value).slice(-1).toLowerCase();
      if (ch && !/[a-z]/.test(ch)) { e.target.value = (s.cells[key] || "").toUpperCase(); return; }
      s.cells[key] = ch;
      e.target.value = ch.toUpperCase();
      if (ch) {
        const parts = key.split(",");
        const r = +parts[0], c = +parts[1];
        const nx = document.querySelector('[data-cw="' + r + "," + (c + 1) + '"]') || document.querySelector('[data-cw="' + (r + 1) + "," + c + '"]');
        if (nx) nx.focus();
      }
    });
  });
}
function crosswordCheck() {
  const s = st.gameState, p = s.puzzle;
  const solved = [];
  p.clues.forEach((x) => {
    const dr = x.dir === "V" ? 1 : 0, dc = x.dir === "H" ? 1 : 0;
    let ok = true;
    for (let i = 0; i < x.w.length; i++)
      if ((s.cells[(x.r + dr * i) + "," + (x.c + dc * i)] || "") !== x.w[i]) ok = false;
    if (ok) solved.push(x.w);
    record("cw-" + st.topic + "-" + x.w, ok);
  });
  s.solved = solved; s.checked = true;
  addXp(solved.length * 12);
  if (solved.length === p.clues.length) speak("Excellent");
  render();
}
function crosswordReveal() {
  const s = st.gameState, p = s.puzzle;
  for (let r = 0; r < p.H; r++)
    for (let c = 0; c < p.W; c++)
      if (p.grid[r][c]) s.cells[r + "," + c] = p.grid[r][c];
  s.checked = true; s.solved = [];
  render();
}

/* ---------- Trò 3: Lật thẻ ghép cặp ---------- */
function startGameMatch(topicId) {
  const t = TOPIC_BY_ID[topicId];
  const pairs = t.words.slice(0, 6);
  const deck = shuffle(pairs.reduce((acc, w, i) => acc.concat([
    { uid: "e" + i, pair: i, face: w[0], side: "en" },
    { uid: "v" + i, pair: i, face: w[1], side: "vi" },
  ]), []));
  st.topic = topicId;
  st.gameState = { pairs, deck, open: [], matched: [], moves: 0, busy: false };
  go("gmatch");
}
function viewGameMatch() {
  const s = st.gameState, t = TOPIC_BY_ID[st.topic];
  if (s.matched.length === s.pairs.length)
    return '<section class="card center pad"><div style="font-size:54px">🎯</div><h2>Ghép xong!</h2>' +
      '<p class="muted">' + s.moves + " lượt lật · " + s.pairs.length + " cặp</p>" +
      '<button class="btn" data-act="tab" data-arg="games">Về sảnh trò chơi</button></section>';

  let h = '<div class="topbar"><button class="x" data-act="tab" data-arg="games" aria-label="Thoát">✕</button>' +
    '<div class="bar"><div class="fill" style="width:' + (s.matched.length / s.pairs.length) * 100 + '%;background:var(--leaf)"></div></div>' +
    '<span class="hearts">' + s.moves + " lượt</span></div>";
  h += '<div class="lesson-title">' + esc(t.name) + " · Ghép cặp</div>";
  h += '<div class="cards">';
  s.deck.forEach((c, i) => {
    const open = s.open.some((o) => o.uid === c.uid);
    const done = s.matched.indexOf(c.pair) >= 0;
    const show = open || done;
    h += '<button class="mcard' + (done ? " done" : open ? " open" : "") + (c.side === "en" ? " en" : "") + '" data-act="flip" data-arg="' + i + '"' + (done || s.busy ? " disabled" : "") + ">" +
      (show ? esc(c.face) : '<span class="mcard-back">' + t.emoji + "</span>") + "</button>";
  });
  h += "</div>";
  return h;
}
function flipCard(i) {
  const s = st.gameState;
  if (s.busy) return;
  const c = s.deck[i];
  if (s.matched.indexOf(c.pair) >= 0) return;
  if (s.open.some((o) => o.uid === c.uid)) return;
  if (s.open.length >= 2) return;
  s.open.push(c);
  if (s.open.length === 2) {
    s.busy = true; s.moves++;
    const a = s.open[0], b = s.open[1];
    const ok = a.pair === b.pair;
    render();
    setTimeout(() => {
      if (ok) { s.matched.push(a.pair); speak(s.pairs[a.pair][0]); addXp(10); }
      record("mm-" + st.topic + "-" + a.pair, ok);
      s.open = []; s.busy = false;
      render();
    }, ok ? 550 : 950);
    return;
  }
  render();
}

/* ================================================================
   NHẬN DIỆN GIỌNG NÓI
   ================================================================ */
function sayDialogueLines(lines, i) {
  if (typeof window === "undefined" || !window.speechSynthesis) return;
  if (i === 0) window.speechSynthesis.cancel();
  if (i >= lines.length) return;
  var u;
  try { u = new SpeechSynthesisUtterance(lines[i].t); } catch (e) { return; }
  u.lang = "en-US"; u.rate = 0.9;
  u.onend = function () { setTimeout(function () { sayDialogueLines(lines, i + 1); }, 250); };
  window.speechSynthesis.speak(u);
}
function runASR(target, onDone) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { onDone(null); return; }
  let r;
  try { r = new SR(); } catch (e) { onDone(null); return; }
  r.lang = "en-US"; r.interimResults = false; r.maxAlternatives = 3;
  r.onresult = (e) => {
    const alts = [];
    for (let i = 0; i < e.results[0].length; i++) alts.push(e.results[0][i].transcript);
    let best = 0;
    alts.forEach((t) => { best = Math.max(best, similarity(t, target)); });
    onDone({ score: best, heard: alts[0] });
  };
  r.onerror = () => onDone(null);
  try { r.start(); } catch (e) { onDone(null); }
}

/* ================================================================
   XỬ LÝ SỰ KIỆN (uỷ quyền)
   ================================================================ */
function onClick(e) {
  const btn = e.target.closest("[data-act]");
  if (!btn) return;
  const act = btn.getAttribute("data-act");
  const arg = btn.getAttribute("data-arg");

  switch (act) {
    case "tab":
      if (arg === "map") { st.level = null; st.topic = null; }
      go(arg);
      break;
    case "level": st.level = +arg; go("topics"); break;
    case "topic": startLesson(+arg); break;
    case "review": startReview(); break;
    case "pick": if (!st.result) { st.picked = arg; render(); } break;
    case "para-pick": {
      if (st.result) break;
      const p = arg.split("|"); st.paraPicked = st.paraPicked || {};
      st.paraPicked[+p[0]] = p.slice(1).join("|"); render(); break;
    }
    case "dlg-pick": {
      if (st.result) break;
      const p = arg.split("|"); st.dlgPicked = st.dlgPicked || {};
      st.dlgPicked[+p[0]] = p.slice(1).join("|"); render(); break;
    }
    case "say-dialogue": {
      const d = ITEM_BY_ID[arg]; if (!d) break;
      sayDialogueLines(d.data.lines, 0); break;
    }
    case "scramble-add": {
      if (st.result) break;
      const pi = +arg; const p = st.scramblePool[pi];
      if (p && !p.used) { p.used = true; st.scrambleBuilt.push(p.ch); render(); }
      break;
    }
    case "scramble-clear": {
      if (st.result) break;
      st.scrambleBuilt = []; (st.scramblePool || []).forEach((p) => (p.used = false)); render(); break;
    }
    case "check": checkAnswer(); break;
    case "next": nextExercise(); break;
    case "say": speak(arg, 0.75); break;
    case "travel": travel(+arg); break;
    case "export": exportJSON(); break;
    case "import": { const f = $("#file"); if (f) f.click(); break; }
    case "game": st.game = arg; go("gpick"); break;
    case "gtopic":
      if (st.game === "gspeak") startGameSpeak(+arg);
      else if (st.game === "gcross") startGameCross(+arg);
      else startGameMatch(+arg);
      break;

    case "mic": {
      if (!st.gameState) st.gameState = {};
      st.gameState.listening = true; render();
      runASR(st.ex.item.en, (res) => {
        st.gameState.listening = false;
        if (!res) { toast("Không nghe được, thử lại"); render(); return; }
        const ok = res.score >= 0.7;
        toast("Phát âm: " + Math.round(res.score * 100) + "%");
        grade(ok);
      });
      break;
    }
    case "speak-skip": grade(true); break;

    case "gs-mic": {
      const s = st.gameState;
      const it = s.deck[s.i];
      s.listening = true; render();
      runASR(it.en, (res) => {
        s.listening = false;
        if (!res) { toast("Không nghe được, thử lại"); render(); return; }
        const ok = res.score >= 0.7;
        s.scored = true; s.score = res.score; s.heard = res.heard;
        s.total += res.score; s.best = Math.max(s.best, res.score);
        s.streak = ok ? s.streak + 1 : 0;
        record(it.key, ok);
        addXp(ok ? (res.score >= 0.9 ? 15 : 10) : 0);
        render();
      });
      break;
    }
    case "gs-next": {
      const s = st.gameState;
      s.i++; s.scored = false; s.score = 0; s.heard = ""; s.listening = false;
      render();
      break;
    }
    case "cw-check": crosswordCheck(); break;
    case "cw-reveal": crosswordReveal(); break;
    case "flip": flipCard(+arg); break;
  }
}

/* ================================================================
   KHỞI ĐỘNG
   ================================================================ */
function boot() {
  document.addEventListener("click", onClick);
  document.addEventListener("change", (e) => {
    if (e.target && e.target.id === "file" && e.target.files && e.target.files[0]) importJSON(e.target.files[0]);
  });
  load();
  render();
}
/* Cửa sổ gỡ lỗi: mở console gõ VT.st để xem toàn bộ trạng thái, VT.mem() để xem bộ nhớ FSRS */
if (typeof window !== "undefined")
  window.VT = { st, ITEMS, TOPICS, LEVELS, retrievability, review, makeCrossword, render,
                buildExercise, buildLesson, buildScramble, TOPIC_BY_ID, ITEM_BY_ID, similarity,
                mem: () => st.mem, reset: () => { st.mem = {}; st.xp = 0; st.streak = 0; st.todayXp = 0; save(); render(); } };

if (typeof document !== "undefined" && document.getElementById("app")) boot();




if ("serviceWorker" in navigator && location.protocol === "https:") {
  window.addEventListener("load", function () { navigator.serviceWorker.register("sw.js").catch(function () {}); });
}
