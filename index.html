<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#E9EFFC">
<meta name="description" content="Vườn từ — học tiếng Anh cho người Việt. 100 chủ đề, 5 cấp độ Pre-A1 đến B2, thuật toán lặp lại ngắt quãng FSRS.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Vườn từ">
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22V%C6%B0%E1%BB%9Dn%20t%E1%BB%AB%20%E2%80%94%20H%E1%BB%8Dc%20ti%E1%BA%BFng%20Anh%22%2C%22short_name%22%3A%22V%C6%B0%E1%BB%9Dn%20t%E1%BB%AB%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23E9EFFC%22%2C%22theme_color%22%3A%22%23E9EFFC%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage/svg%2Bxml%2C%253Csvg%20xmlns%3D%2527http%3A//www.w3.org/2000/svg%2527%20viewBox%3D%25270%200%20100%20100%2527%253E%253Crect%20width%3D%2527100%2527%20height%3D%2527100%2527%20rx%3D%252722%2527%20fill%3D%2527%252317255A%2527/%253E%253Ctext%20y%3D%252772%2527%20x%3D%252750%2527%20font-size%3D%252760%2527%20text-anchor%3D%2527middle%2527%253E%25F0%259F%258C%25B1%253C/text%253E%253C/svg%253E%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image/svg%2Bxml%22%7D%5D%7D">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%2780%27 font-size=%2790%27%3E%F0%9F%8C%B1%3C/text%3E%3C/svg%3E">
<title>Vườn từ — Học tiếng Anh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#17255A; --ink2:#556090; --sky:#E9EFFC; --card:#FFFFFF;
  --mango:#F5A623; --lychee:#E8506E; --leaf:#2BB673; --violet:#8B5CF6;
  --line:#D5DEF5; --shadow:#C9D4EE;
  --display:'Baloo 2', ui-rounded, 'Segoe UI', system-ui, sans-serif;
  --body:'Be Vietnam Pro', system-ui, -apple-system, sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--sky); color:var(--ink); font-family:var(--body);
  -webkit-font-smoothing:antialiased; padding-bottom:78px;
}
#app{max-width:600px;margin:0 auto;padding:16px 16px 8px}
h1{font-family:var(--display);font-weight:800;font-size:28px;margin:2px 0 0;letter-spacing:-.4px;line-height:1.15}
h2{font-family:var(--display);font-weight:800;font-size:23px;margin:2px 0 0;letter-spacing:-.3px}
p{margin:6px 0 0}
.muted{color:var(--ink2);font-size:13px;line-height:1.55}
.center{text-align:center}
.pad{padding:24px 18px}
.leaf{color:var(--leaf)} .lychee{color:var(--lychee)} .mango{color:var(--mango)}

/* Thẻ */
.card{
  background:var(--card); border:1px solid var(--line); border-radius:22px;
  padding:18px; box-shadow:0 2px 0 var(--shadow); margin-bottom:12px;
  width:100%; text-align:left; font-family:var(--body); color:var(--ink);
}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink2)}

/* Pills trạng thái */
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.pill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px;display:flex;gap:6px;align-items:center;font-size:13px}
.pill b{font-family:var(--display);font-size:15px}
.pill i{color:var(--ink2);font-size:11px;font-style:normal}

/* Nút */
.btn{
  font-family:var(--display);font-weight:700;font-size:16px;border:none;border-radius:16px;
  padding:14px 18px;cursor:pointer;width:100%;color:#fff;background:var(--ink);
  box-shadow:0 4px 0 #0E1740;margin-bottom:12px;transition:transform .05s;
}
.btn:active:not(:disabled){transform:translateY(2px);box-shadow:0 2px 0 #0E1740}
.btn:disabled{background:#C6D0E8;box-shadow:none;cursor:not-allowed}
.btn-leaf{background:var(--leaf);box-shadow:0 4px 0 #1D8F59}
.btn-leaf:active:not(:disabled){box-shadow:0 2px 0 #1D8F59}
.btn-lychee{background:var(--lychee);box-shadow:0 4px 0 #B93C55}
.btn-lychee:active:not(:disabled){box-shadow:0 2px 0 #B93C55}
.btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:none;font-size:15px}
.btn-ghost:active{transform:translateY(1px)}
.row{display:flex;gap:8px}
.row .btn{flex:1}
.back{border:none;background:transparent;color:var(--ink2);font-size:14px;cursor:pointer;padding:0;margin-bottom:10px;font-family:var(--body)}
button:focus-visible,input:focus-visible{outline:3px solid var(--mango);outline-offset:2px}

/* Hero + mục tiêu */
.hero h1{margin-top:4px}
.goal{margin-top:14px}
.goal-row{display:flex;justify-content:space-between;font-size:12px;color:var(--ink2);margin-bottom:5px}
.bar{flex:1;height:10px;background:var(--sky);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
.bar.sm{height:6px;margin-top:7px;border:none}
.fill{height:100%;border-radius:99px;transition:width .4s}

/* Cấp độ / trò chơi */
.levels{display:grid;gap:10px}
.level{display:flex;gap:14px;align-items:center;cursor:pointer;margin-bottom:0}
.badge{width:52px;height:52px;border-radius:18px;color:#fff;display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:21px;flex-shrink:0}
.lv-body{flex:1;min-width:0}
.lv-name{font-family:var(--display);font-weight:700;font-size:18px}
.lv-name span{font-size:12px;color:var(--ink2);font-weight:500;font-family:var(--body)}
.lv-desc{font-size:12.5px;color:var(--ink2)}
.lv-note{font-size:11px;font-weight:600;margin-top:2px}
.lv-count{font-size:12px;color:var(--ink2);font-weight:600}

/* Lưới chủ đề */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tile{padding:13px;cursor:pointer;margin-bottom:0}
.tile-emoji{font-size:24px}
.tile-name{font-family:var(--display);font-weight:700;font-size:15px;line-height:1.2;margin-top:3px}
.tile-meta{font-size:11px;color:var(--ink2);margin-top:3px}

/* Bài học */
.topbar{display:flex;gap:10px;align-items:center;margin-bottom:8px}
.x{border:none;background:transparent;font-size:19px;cursor:pointer;color:var(--ink2);padding:0 4px}
.hearts{font-size:11px;color:var(--ink2);font-weight:600;white-space:nowrap}
.lesson-title{font-size:11px;color:var(--ink2);font-weight:600;margin-bottom:10px;text-align:center}
.exercise{min-height:230px}
.big-emoji{font-size:54px;text-align:center;margin:12px 0 2px}
.huge-emoji{font-size:104px;line-height:1.1;margin:8px 0}
.exercise.kid .big-emoji{font-size:76px}
.exercise.kid .opt{font-size:19px;padding:16px 14px}
.exercise.kid .prompt-big{font-size:30px}
.prompt-big{font-family:var(--display);font-weight:700;font-size:24px;text-align:center;line-height:1.45;margin-bottom:6px}
.linkish{border:none;background:transparent;color:var(--ink);cursor:pointer;width:100%}
.blank{color:var(--mango);border-bottom:3px solid var(--mango)}
.gpoint{font-size:11px;color:var(--ink2);font-weight:600;text-align:center;margin:12px 0 8px}
.speaker{border:none;background:var(--ink);color:#fff;width:90px;height:90px;border-radius:30px;font-size:36px;cursor:pointer;box-shadow:0 5px 0 #0E1740;margin:14px 0}
.speaker:active{transform:translateY(2px);box-shadow:0 3px 0 #0E1740}

.options{display:grid;gap:8px;margin-top:16px}
.opt{
  text-align:left;font-family:var(--body);font-weight:500;font-size:15.5px;background:#fff;color:var(--ink);
  border:2px solid var(--line);border-radius:14px;padding:12px 14px;cursor:pointer;line-height:1.4;
}
.opt.sel{background:var(--sky);border-color:var(--ink)}
.opt.right{background:#E8F8F0;border-color:var(--leaf);color:#12784E}
.opt.wrong{background:#FDECEF;border-color:var(--lychee);color:#A82C46}
.opt:disabled{cursor:default}

.passage{background:var(--sky);border-radius:14px;padding:14px;margin:12px 0;font-size:14.5px;line-height:1.65}
.passage p{margin:0}
.passage-head{font-family:var(--display);font-weight:700;display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px}
.mini{border:none;background:#fff;border-radius:10px;padding:4px 9px;cursor:pointer;font-size:12px;font-family:var(--body);white-space:nowrap}
.q{font-family:var(--display);font-weight:700;margin-top:12px;font-size:16px}

.feedback{border-radius:16px;padding:14px;margin-bottom:10px}
.feedback.ok{background:#E8F8F0;border:1px solid var(--leaf)}
.feedback.no{background:#FDECEF;border:1px solid var(--lychee)}
.fb-title{font-family:var(--display);font-weight:800;font-size:17px}
.feedback.ok .fb-title{color:#12784E}
.feedback.no .fb-title{color:#A82C46}
.fb-body{font-size:13px;color:var(--ink2);margin-top:3px;line-height:1.5}
.notice{font-size:13px;color:var(--ink2);background:var(--sky);border-radius:12px;padding:12px;line-height:1.55}

/* Micro */
.mic{border:none;width:92px;height:92px;border-radius:30px;font-size:38px;cursor:pointer;color:#fff;background:var(--ink);box-shadow:0 6px 0 #0E1740}
.mic.listening{background:var(--lychee);box-shadow:none}
.mic:active:not(.listening){transform:translateY(2px);box-shadow:0 4px 0 #0E1740}
.mic-hint{font-size:12px;color:var(--ink2);margin-top:10px;font-weight:600}
.mic-hint.live{color:var(--lychee)}
.hintlink{border:none;background:transparent;color:var(--ink2);font-size:13px;cursor:pointer;font-family:var(--body);text-decoration:underline;margin:6px 0 16px}
.score{font-family:var(--display);font-weight:800;font-size:46px;margin:6px 0}
.heard{font-size:12px;color:var(--ink2);background:var(--sky);border-radius:10px;padding:8px 10px;display:inline-block;margin-top:8px}
.streak{font-size:12px;font-weight:700;color:var(--mango)}

/* Vườn trí nhớ */
.plots{display:flex;flex-wrap:wrap;gap:7px}
.plot{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;font-size:14px}
.table-card{padding:0;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:var(--sky);text-align:left;padding:9px 10px;font-size:11px;font-weight:600}
td{padding:8px 10px;border-top:1px solid var(--line)}

/* Ô chữ */
.cw-wrap{overflow-x:auto;display:flex;justify-content:center}
.cw{display:grid;gap:2px;justify-content:center}
.cw-void{width:var(--cw);height:var(--cw)}
.cw-cell{position:relative;width:var(--cw);height:var(--cw)}
.cw-num{position:absolute;top:0;left:2px;font-size:8px;font-weight:700;color:var(--ink2);z-index:1;pointer-events:none}
.cw-cell input{
  width:100%;height:100%;text-align:center;font-family:var(--display);font-weight:700;
  font-size:calc(var(--cw) * .5);border:1.5px solid var(--line);border-radius:5px;
  background:#fff;color:var(--ink);padding:0;text-transform:uppercase;
}
.cw-cell.right input{background:#E8F8F0;border-color:var(--leaf);color:#12784E}
.cw-cell.wrong input{background:#FDECEF;border-color:var(--lychee);color:#A82C46}
.clue-group{margin-top:10px}
.clue-head{font-family:var(--display);font-weight:700;font-size:14px;margin-bottom:4px}
.clue{font-size:13.5px;padding:3px 0;display:flex;gap:6px}
.clue b{min-width:16px}
.clue i{color:var(--ink2);font-size:11px;font-style:normal}
.clue.ok{color:var(--leaf)}
.clue.miss{color:var(--ink2)}

/* Lật thẻ */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mcard{
  height:86px;border-radius:14px;cursor:pointer;border:2px solid var(--line);background:var(--ink);
  color:var(--ink);font-family:var(--body);font-weight:500;font-size:13.5px;padding:6px;line-height:1.25;
  transition:background .15s;
}
.mcard.en{font-family:var(--display);font-weight:700}
.mcard.open{background:#fff;border-color:var(--ink)}
.mcard.done{background:#E8F8F0;border-color:var(--leaf);color:#12784E;cursor:default}
.mcard-back{font-size:26px}

/* Điều hướng dưới */
#nav{
  position:fixed;bottom:0;left:0;right:0;display:flex;background:#fff;border-top:1px solid var(--line);
  padding:8px 0 max(8px, env(safe-area-inset-bottom));z-index:40;
}
.tab{
  flex:1;border:none;background:transparent;cursor:pointer;font-family:var(--body);font-weight:600;
  font-size:11px;color:var(--ink2);display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;
}
.tab span{font-size:20px;filter:grayscale(1);opacity:.55}
.tab.on{color:var(--ink)}
.tab.on span{filter:none;opacity:1}

/* Toast */
#toast{
  position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(12px);
  background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;font-weight:600;
  z-index:60;max-width:92vw;text-align:center;opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Chuyển động */
@keyframes rise{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes ping{0%{box-shadow:0 0 0 0 rgba(232,80,110,.5)}100%{box-shadow:0 0 0 16px rgba(232,80,110,0)}}
.rise{animation:rise .22s ease-out}
.ping{animation:ping 1.2s infinite}
@media (prefers-reduced-motion:reduce){.rise,.ping{animation:none}}

@media (max-width:380px){
  h1{font-size:24px}
  .grid2{gap:8px}
  .tile-name{font-size:14px}
}

</style>
</head>
<body>
<main id="app"></main>
<nav id="nav" aria-label="Điều hướng chính"></nav>
<div id="toast" role="status" aria-live="polite"></div>

<script>
/* ============================================================
   VƯỜN TỪ — BẢN TRIỂN KHAI WEB
   Một file duy nhất. Không thư viện. Không server. Không build.
   Tiến độ lưu tại localStorage trên máy người học.

   • 100 chủ đề · 5 cấp (Pre-A1 → B2, khung CEFR)
   • 500 từ · 36 điểm ngữ pháp · 60 bài đọc (180 câu hỏi)
   • Engine FSRS-lite (lặp lại ngắt quãng)
   • 3 trò chơi: phát âm theo hình · ô chữ tự sinh · lật thẻ
   Nội dung tự soạn. Không sao chép BBC / Lingokids / Duolingo.
   ============================================================ */
/* ---------- DỮ LIỆU (trích từ vuon-tu-v2.jsx & readings-full.js) ---------- */
const T = (id, level, name, emoji, words) => ({ id, level, name, emoji, words });
const G = (level, point, q, opts, a, why) => ({ level, point, q, opts, a, why });
const R = (topicId, level, title, text, qs) => ({ topicId, level, title, text, qs });
const TOPICS = [
  /* ===== CẤP 1 — MẦM (Pre-A1) ===== */
  T(1, 1, "Chào hỏi", "👋", [["hello", "xin chào"], ["bye", "tạm biệt"], ["yes", "vâng / có"], ["no", "không"], ["hi", "chào"]]),
  T(2, 1, "Bảng chữ cái", "🔤", [["letter", "chữ cái"], ["A is for apple", "A là quả táo"], ["B is for ball", "B là quả bóng"], ["C is for cat", "C là con mèo"], ["D is for dog", "D là con chó"]]),
  T(3, 1, "Số 1–10", "🔢", [["one", "một"], ["three", "ba"], ["five", "năm"], ["eight", "tám"], ["ten", "mười"]]),
  T(4, 1, "Màu sắc", "🎨", [["red", "màu đỏ"], ["blue", "màu xanh dương"], ["green", "màu xanh lá"], ["yellow", "màu vàng"], ["black", "màu đen"]]),
  T(5, 1, "Hình khối", "🔺", [["circle", "hình tròn"], ["square", "hình vuông"], ["triangle", "hình tam giác"], ["star", "ngôi sao"], ["heart", "hình trái tim"]]),
  T(6, 1, "Gia đình", "👨‍👩‍👧", [["mother", "mẹ"], ["father", "bố"], ["sister", "chị / em gái"], ["brother", "anh / em trai"], ["baby", "em bé"]]),
  T(7, 1, "Cơ thể", "🖐️", [["head", "cái đầu"], ["hand", "bàn tay"], ["eye", "con mắt"], ["nose", "cái mũi"], ["foot", "bàn chân"]]),
  T(8, 1, "Vật nuôi", "🐶", [["dog", "con chó"], ["cat", "con mèo"], ["fish", "con cá"], ["bird", "con chim"], ["rabbit", "con thỏ"]]),
  T(9, 1, "Động vật nông trại", "🐄", [["cow", "con bò"], ["pig", "con lợn"], ["duck", "con vịt"], ["buffalo", "con trâu"], ["chicken", "con gà"]]),
  T(10, 1, "Thú hoang dã", "🦁", [["lion", "sư tử"], ["elephant", "con voi"], ["monkey", "con khỉ"], ["tiger", "con hổ"], ["bear", "con gấu"]]),
  T(11, 1, "Trái cây", "🍎", [["apple", "quả táo"], ["banana", "quả chuối"], ["mango", "quả xoài"], ["orange", "quả cam"], ["grape", "quả nho"]]),
  T(12, 1, "Rau củ", "🥕", [["carrot", "cà rốt"], ["tomato", "cà chua"], ["potato", "khoai tây"], ["onion", "củ hành"], ["cabbage", "bắp cải"]]),
  T(13, 1, "Đồ ăn & thức uống", "🍚", [["rice", "cơm"], ["bread", "bánh mì"], ["milk", "sữa"], ["water", "nước"], ["egg", "quả trứng"]]),
  T(14, 1, "Quần áo", "👕", [["shirt", "áo sơ mi"], ["hat", "cái mũ"], ["shoes", "đôi giày"], ["dress", "váy đầm"], ["socks", "đôi tất"]]),
  T(15, 1, "Đồ chơi", "🧸", [["ball", "quả bóng"], ["doll", "búp bê"], ["kite", "cái diều"], ["blocks", "khối xếp hình"], ["car", "xe đồ chơi"]]),
  T(16, 1, "Trong nhà", "🏠", [["door", "cửa ra vào"], ["window", "cửa sổ"], ["table", "cái bàn"], ["chair", "cái ghế"], ["bed", "cái giường"]]),
  T(17, 1, "Phương tiện", "🚌", [["bus", "xe buýt"], ["bike", "xe đạp"], ["boat", "con thuyền"], ["plane", "máy bay"], ["train", "tàu hoả"]]),
  T(18, 1, "Thời tiết", "☀️", [["sunny", "trời nắng"], ["rainy", "trời mưa"], ["windy", "có gió"], ["hot", "nóng"], ["cold", "lạnh"]]),
  T(19, 1, "Cảm xúc", "😊", [["happy", "vui"], ["sad", "buồn"], ["angry", "tức giận"], ["tired", "mệt"], ["scared", "sợ hãi"]]),
  T(20, 1, "Nói lời lịch sự", "🙏", [["please", "làm ơn"], ["thank you", "cảm ơn"], ["sorry", "xin lỗi"], ["excuse me", "xin phép"], ["you're welcome", "không có gì"]]),

  /* ===== CẤP 2 — CHỒI (A1) ===== */
  T(21, 2, "Trường học", "🏫", [["classroom", "lớp học"], ["teacher", "giáo viên"], ["student", "học sinh"], ["playground", "sân chơi"], ["library", "thư viện"]]),

  G(4, "Câu điều kiện loại 1", "If we ___ now, we'll catch the train.", ["leave", "will leave", "left", "would leave"], "leave", "Loại 1: If + hiện tại đơn, will + V."),
  G(4, "Câu điều kiện loại 2", "If I ___ you, I would accept the offer.", ["am", "was", "were", "will be"], "were", "Loại 2 giả định: “If I were you” là chuẩn."),
  G(4, "Mệnh đề quan hệ", "The colleague ___ helped me has resigned.", ["which", "who", "whose", "whom"], "who", "Chủ ngữ chỉ người → “who”."),
  G(4, "Câu tường thuật", "He said he ___ busy that day.", ["is", "was", "will be", "has been"], "was", "Tường thuật lùi thì: is → was."),
  G(4, "Động từ khuyết thiếu – suy đoán", "She ___ be at the meeting; her car is outside.", ["must", "can't", "might not", "shouldn't"], "must", "Bằng chứng chắc chắn → “must be” (chắc hẳn là)."),
  G(4, "Gerund vs Infinitive", "I'm considering ___ the deadline.", ["to extend", "extending", "extend", "extended"], "extending", "“consider” đi với V-ing."),
  G(4, "Used to", "I ___ commute by motorbike.", ["used to", "use to", "am used to", "was use to"], "used to", "Thói quen quá khứ nay không còn: “used to + V”."),
  G(4, "Quá khứ tiếp diễn", "While I ___, the phone rang.", ["cook", "cooked", "was cooking", "have cooked"], "was cooking", "Hành động đang diễn ra thì bị cắt ngang → quá khứ tiếp diễn."),
  G(4, "So sánh với as...as", "This route is not ___ as the old one.", ["as fast", "so faster", "fast as", "as faster"], "as fast", "Cấu trúc: not as + adj + as."),
  G(4, "Cụm động từ", "We need to ___ the meeting until Friday.", ["put off", "put on", "put up", "put out"], "put off", "“put off” = hoãn lại."),
  // B2
  G(5, "Điều kiện loại 3", "If they ___ the risk, they wouldn't have signed.", ["knew", "had known", "would know", "know"], "had known", "Loại 3 (tiếc nuối quá khứ): If + had + V3, would have + V3."),
  G(5, "Điều kiện hỗn hợp", "If she had studied law, she ___ a judge now.", ["would be", "would have been", "will be", "was"], "would be", "Điều kiện hỗn hợp: quá khứ giả định → kết quả ở hiện tại."),
  G(5, "Đảo ngữ nhấn mạnh", "Not only ___ the deadline, but he also cut costs.", ["he met", "did he meet", "he did meet", "met he"], "did he meet", "“Not only” đầu câu → đảo ngữ: trợ động từ trước chủ ngữ."),
  G(5, "Wish / If only", "I wish I ___ more time to prepare.", ["have", "had", "will have", "would had"], "had", "Ước ở hiện tại → lùi một thì: “wish + past simple”."),
  G(5, "Bị động với động từ tường thuật", "The contract ___ to have been amended.", ["is believed", "believes", "believing", "believed"], "is believed", "Cấu trúc: S + is believed/said + to have V3."),
  G(5, "Mệnh đề nhượng bộ", "___ the delay, the project stayed within budget.", ["Although", "Despite", "However", "Because"], "Despite", "“Despite + danh từ/cụm danh từ” (không có mệnh đề)."),
  G(5, "Rút gọn mệnh đề quan hệ", "The bidders ___ for clarification received a reply.", ["asked", "asking", "who asking", "which asked"], "asking", "Rút gọn mệnh đề chủ động: who asked → asking."),
  G(5, "Câu giả định (subjunctive)", "The board demanded that he ___ present.", ["is", "be", "was", "will be"], "be", "Sau demand/require/insist that → động từ nguyên thể không “to”."),
  G(5, "Trật tự tính từ", "She bought a ___ table.", ["wooden round large", "large round wooden", "round large wooden", "wooden large round"], "large round wooden", "Trật tự: kích thước → hình dáng → chất liệu."),
  G(5, "Cấu trúc nhấn mạnh (cleft)", "___ we need is a clearer specification.", ["That", "What", "Which", "It"], "What", "Câu chẻ: “What + mệnh đề + is/are + …”."),
  G(5, "Hàm ý & sắc thái modal", "You ___ have told me earlier — I could have helped.", ["should", "must", "can", "will"], "should", "“should have + V3” = đáng lẽ phải (trách móc quá khứ)."),
  G(5, "Liên từ mức độ cao", "The estimate was rejected; ___, the tender was re-issued.", ["moreover", "consequently", "nevertheless", "meanwhile"], "consequently", "Quan hệ nhân–quả → “consequently”."),
].map((g, i) => ({ id: "g" + i, kind: "grammar", ...g }));

const READINGS = [
  /* ============ CẤP 3 — LÁ (A2) ============ */

  R(41, 3, "Who am I?", "My name is Trang. I am twenty-four years old and I come from Nam Dinh, a small province in the north of Vietnam. I moved to Ho Chi Minh City three years ago to work as a nurse. People often ask me if I miss my hometown. I do, especially the food, but I go back twice a year for Tet and for my mother's birthday. In my free time I grow small plants on my balcony. It is a quiet hobby, but after a long day at the hospital, quiet is exactly what I want.", [
    { q: "What is Trang's occupation?", opts: ["A teacher", "A nurse", "A farmer", "A student"], a: "A nurse" },
    { q: "How often does Trang return to her hometown?", opts: ["Every month", "Twice a year", "Never", "Every weekend"], a: "Twice a year" },
    { q: "Why does she like her hobby?", opts: ["It makes money", "It is quiet after a busy day", "Her mother taught her", "It is popular"], a: "It is quiet after a busy day" },
  ]),

  R(42, 3, "Finding the post office", "Mai is new in the city. She wants to send a parcel to her grandmother, so she asks a man at the bus stop. He tells her to go straight for two blocks, then turn left at the big market. The post office is on the corner, opposite a small coffee shop. It closes at five, so Mai decides to walk quickly. She arrives at ten to five and posts the parcel just in time.", [
    { q: "Where is the post office?", opts: ["Next to the market", "On the corner opposite a coffee shop", "Inside the bus stop", "Behind the school"], a: "On the corner opposite a coffee shop" },
    { q: "Why does Mai walk quickly?", opts: ["It is raining", "The post office closes at five", "The bus is late", "She is meeting a friend"], a: "The post office closes at five" },
    { q: "What does “just in time” mean here?", opts: ["Too late", "Very early", "Only barely on time", "At the wrong place"], a: "Only barely on time" },
  ]),

  R(43, 3, "The wrong platform", "Duc bought a ticket for the seven o'clock train to Hue. He waited on platform two for twenty minutes, but no train came. Then he heard an announcement: the Hue train was leaving from platform five. He ran across the station and reached the door just as it was closing. A guard let him on. Later, Duc looked at his ticket again. The platform number was printed clearly at the bottom. He had simply never read it.", [
    { q: "Which platform did the Hue train leave from?", opts: ["Platform two", "Platform five", "Platform seven", "Platform one"], a: "Platform five" },
    { q: "What is the main point of the story?", opts: ["Trains are often late", "Duc did not read his own ticket carefully", "Guards are unhelpful", "Hue is far away"], a: "Duc did not read his own ticket carefully" },
    { q: "How did Duc find out about the change?", opts: ["A friend told him", "He heard an announcement", "He read a sign", "The guard called him"], a: "He heard an announcement" },
  ]),

  R(44, 3, "The clever aisle", "Have you noticed that milk and eggs are usually at the back of the supermarket? This is not an accident. These are things almost everyone buys, so the shop puts them far from the door. To reach them, you must walk past many other products. Sweets and snacks are placed near the checkout, where you wait and get bored. The discount signs at the end of each aisle are the biggest of all. Supermarkets do not just sell food; they design the walk you take.", [
    { q: "Where are milk and eggs usually placed?", opts: ["Near the door", "At the back", "Near the checkout", "Outside"], a: "At the back" },
    { q: "What is the main idea?", opts: ["Supermarkets arrange the shop to make you buy more", "Milk is expensive", "Checkouts are slow", "Discounts are always fake"], a: "Supermarkets arrange the shop to make you buy more" },
    { q: "Why are snacks placed near the checkout?", opts: ["They are cheap", "You are waiting and bored there", "They need to stay cold", "They are heavy"], a: "You are waiting and bored there" },
  ]),

  R(45, 3, "My grandmother's recipe", "My grandmother never used a recipe book. She measured salt with her hand and knew when the soup was ready by its smell. When I asked her how much fish sauce to add, she said, “Enough.” Last year I tried to write her pho recipe down. I stood in the kitchen with a notebook while she chopped onions and boiled the bones for six hours. The list of ingredients was short, but the instructions filled three pages. Most of them were about waiting.", [
    { q: "How long did she boil the bones?", opts: ["One hour", "Three hours", "Six hours", "All night"], a: "Six hours" },
    { q: "What did the writer discover about the recipe?", opts: ["It needed many ingredients", "Most of the instructions were about waiting", "It was very cheap", "It was written in a book"], a: "Most of the instructions were about waiting" },
    { q: "When the grandmother said “Enough,” she meant", opts: ["She was tired", "She judged the amount by experience, not measurement", "There was no fish sauce", "The soup was finished"], a: "She judged the amount by experience, not measurement" },
  ]),

  R(46, 3, "A bad week", "Last Monday Nam woke up with a headache and a mild fever. He drank a lot of water and rested, but by Wednesday he also had a cough. His mother told him to see a doctor. The doctor said it was only a common cold and gave him some medicine. She also told him not to drink cold water and to sleep at least eight hours a night. By Sunday, Nam felt much better and went back to school.", [
    { q: "What symptom did Nam have first?", opts: ["A cough", "A headache and fever", "A sore leg", "A stomach ache"], a: "A headache and fever" },
    { q: "What did the doctor say the illness was?", opts: ["A serious disease", "A common cold", "Food poisoning", "The flu"], a: "A common cold" },
    { q: "Which advice did the doctor NOT give?", opts: ["Sleep eight hours", "Avoid cold water", "Take medicine", "Stop going to school forever"], a: "Stop going to school forever" },
  ]),

  R(47, 3, "The waiting room", "Hoa arrived at the clinic at eight, but her appointment was at half past nine. She wanted to be early because the waiting room is always full. When the nurse called her name, the doctor asked about her symptoms: a pain in her shoulder for two weeks. He examined her arm, asked her to lift it, and said the muscle was inflamed. He wrote a prescription and told her to come back in ten days. “And stop carrying your bag on that side,” he added.", [
    { q: "What time was Hoa's appointment?", opts: ["Eight o'clock", "Nine o'clock", "Half past nine", "Ten o'clock"], a: "Half past nine" },
    { q: "What did the doctor diagnose?", opts: ["A broken bone", "An inflamed muscle", "A fever", "Nothing at all"], a: "An inflamed muscle" },
    { q: "The doctor's last comment suggests that", opts: ["Her bag may be causing the problem", "She should buy a new bag", "She should stop working", "The medicine will not work"], a: "Her bag may be causing the problem" },
  ]),

  R(48, 3, "Ten minutes is enough", "Many people join a gym in January and stop going by March. The problem is usually not laziness — it is the plan. If you decide to exercise for ninety minutes, five days a week, you need a free evening, clean clothes, and a lot of energy. If any one of them is missing, you skip. But ten minutes at home needs almost nothing. It is not enough to make you strong quickly, but it is enough to keep the habit alive. A small habit that survives beats a big one that dies.", [
    { q: "When do many people stop going to the gym?", opts: ["In January", "By March", "In summer", "After one year"], a: "By March" },
    { q: "What is the main argument?", opts: ["Gyms are too expensive", "A small habit that survives is better than a big one that fails", "Ninety minutes is the right amount", "Exercise is not important"], a: "A small habit that survives is better than a big one that fails" },
    { q: "Why does a big plan fail easily?", opts: ["It needs many conditions to be true at once", "It is boring", "It is dangerous", "Nobody knows how to do it"], a: "It needs many conditions to be true at once" },
  ]),

  R(49, 3, "The room with no view", "The website showed a photo of a bright room with a balcony over the sea. When Lan and her husband checked in, the receptionist gave them a room on the ground floor, facing the car park. Lan showed her the booking. The receptionist explained that the sea-view rooms were an extra charge and the photo was only an example. Lan was polite but firm: the page had not said so. After ten minutes, they were moved upstairs. The lesson, Lan says, is to always read what the price actually includes.", [
    { q: "What did the first room face?", opts: ["The sea", "The car park", "A garden", "The street"], a: "The car park" },
    { q: "What was the receptionist's explanation?", opts: ["The hotel was full", "Sea-view rooms cost extra", "The photo was old", "There was a mistake in the system"], a: "Sea-view rooms cost extra" },
    { q: "“Polite but firm” means Lan was", opts: ["Angry and rude", "Calm but did not give up", "Silent", "Ready to leave"], a: "Calm but did not give up" },
  ]),

  R(50, 3, "Two hours early", "Airports tell you to arrive two hours before departure. Most of that time is not spent flying — it is spent waiting. You check in, you drop your luggage, you pass security, and then you sit. Some travellers hate this. Others plan for it: they bring a book, they eat properly, they charge their phone. The flight itself may be delayed, and the ones who planned for waiting are calm, while the ones who arrived at the last minute are the most stressed of all.", [
    { q: "How early do airports ask you to arrive?", opts: ["One hour", "Two hours", "Three hours", "Thirty minutes"], a: "Two hours" },
    { q: "What is the writer's point?", opts: ["Flights are always delayed", "Travellers who plan for waiting cope better", "Airports are badly designed", "Security is too slow"], a: "Travellers who plan for waiting cope better" },
    { q: "Who becomes most stressed when there is a delay?", opts: ["Those who arrived at the last minute", "Those who brought a book", "The staff", "Those who ate properly"], a: "Those who arrived at the last minute" },
  ]),

  R(51, 3, "The rain that did not come", "In the Mekong Delta, farmers used to know when the rain would arrive. Now the forecast is less useful than it was. Some years the rain comes a month late; some years it does not stop for weeks and the fields flood. Salt water has moved further up the rivers, and rice does not grow well in salty soil. Many families have changed to shrimp farming instead. It is not the life they planned, but it is the life the water allows.", [
    { q: "What has moved further up the rivers?", opts: ["Fresh water", "Salt water", "Boats", "Fish"], a: "Salt water" },
    { q: "What is the main idea?", opts: ["Farmers are adapting because the climate has changed", "Shrimp is more profitable than rice", "Forecasts are always wrong", "The Mekong is beautiful"], a: "Farmers are adapting because the climate has changed" },
    { q: "“The life the water allows” suggests that", opts: ["Farmers freely chose shrimp farming", "The environment, not the farmers, decided the change", "Water is plentiful", "Rice is no longer eaten"], a: "The environment, not the farmers, decided the change" },
  ]),

  R(52, 3, "The empty living room", "When Khanh moved into his first apartment, he wanted to fill it immediately: a sofa, a big television, a bookshelf, a coffee table. His sister told him to wait one month and live in the empty room first. After four weeks, he knew exactly where the morning light fell and where he actually sat. He bought a chair by the window and a small table. He never bought the sofa. “The room told me what it needed,” he says. “I just had to be quiet enough to hear it.”", [
    { q: "What did Khanh's sister tell him to do?", opts: ["Buy a sofa first", "Live in the empty room for a month", "Paint the walls", "Move somewhere cheaper"], a: "Live in the empty room for a month" },
    { q: "What did Khanh finally buy?", opts: ["A sofa and a television", "A chair by the window and a small table", "Nothing at all", "A bookshelf"], a: "A chair by the window and a small table" },
    { q: "The main lesson is that", opts: ["Furniture is expensive", "Waiting reveals what you really need", "Sisters are always right", "Empty rooms are sad"], a: "Waiting reveals what you really need" },
  ]),

  R(53, 3, "Whose turn is it?", "In many homes, the arguments are not about big things. They are about the dishes. One person believes they do most of the work; the other believes the same. Both are usually honest, because we notice our own effort and forget the effort we do not see. One family solved it with a piece of paper on the fridge: each chore, each week, each name. The arguments stopped almost at once. Not because the work became fair, but because it became visible.", [
    { q: "What did the family put on the fridge?", opts: ["A photo", "A list of chores, weeks and names", "A calendar of holidays", "A shopping list"], a: "A list of chores, weeks and names" },
    { q: "Why do both people think they do more?", opts: ["They are dishonest", "We notice our own effort and miss what we do not see", "One of them is lying", "They do not talk"], a: "We notice our own effort and miss what we do not see" },
    { q: "The arguments stopped because the work became", opts: ["Easier", "Visible", "Shared equally", "Unnecessary"], a: "Visible" },
  ]),

  R(54, 3, "The battery problem", "Modern phones are faster, brighter and thinner than ever, but the battery still dies before the day does. Part of the reason is us: bigger screens and more apps need more power. Part of it is design — a thin phone has less room for a battery. Some engineers say we could have phones that last three days, but they would be heavier and nobody would buy them. So every year the phone gets a little better and the charger stays in your bag.", [
    { q: "Why is a thin phone harder to power?", opts: ["It has less room for a battery", "It uses old software", "It has a small screen", "It is cheaper"], a: "It has less room for a battery" },
    { q: "What is the main point?", opts: ["Batteries could be better, but buyers prefer thin phones", "Phones are badly made", "Chargers are unnecessary", "Apps should be banned"], a: "Batteries could be better, but buyers prefer thin phones" },
    { q: "“The charger stays in your bag” implies that", opts: ["We still cannot last a day without charging", "Chargers are free", "Bags are useful", "Phones are waterproof"], a: "We still cannot last a day without charging" },
  ]),

  R(55, 3, "The number under the photo", "Before social media, if you cooked a good meal, you enjoyed it. Now you photograph it, post it, and check how many people liked it. The number under the photo becomes part of the meal. This is not entirely bad — people share recipes, find friends, and learn from each other. But researchers warn about a quiet change: we begin to choose what to do based on what will look good, not on what we will enjoy. The camera slowly moves from recording life to directing it.", [
    { q: "What do researchers warn about?", opts: ["Bad photos", "Choosing activities for how they look, not for enjoyment", "Slow internet", "Too many recipes"], a: "Choosing activities for how they look, not for enjoyment" },
    { q: "The writer's view of social media is", opts: ["Entirely negative", "Mixed — useful, but with a hidden cost", "Entirely positive", "Uninterested"], a: "Mixed — useful, but with a hidden cost" },
    { q: "“The camera moves from recording life to directing it” means", opts: ["Cameras have better quality", "We now live in order to be photographed", "Film directors use phones", "Photos replace memory"], a: "We now live in order to be photographed" },
  ]),

  R(56, 3, "The envelope method", "Linh earns eight million dong a month, but at the end of every month she has nothing left. A friend suggested a simple habit: on payday, put money into separate envelopes — rent, food, transport, and savings — before spending anything. At first Linh thought it was old-fashioned, but after three months she had saved two million dong. She says the trick is not earning more; it is deciding where the money goes before it disappears.", [
    { q: "What is the main idea?", opts: ["Linh needs a better job", "Planning where money goes helps you save", "Envelopes are old-fashioned", "Rent is too expensive"], a: "Planning where money goes helps you save" },
    { q: "When does Linh divide the money?", opts: ["At the end of the month", "On payday, before spending", "Only when she needs to", "Every Sunday"], a: "On payday, before spending" },
    { q: "How did Linh first react to the idea?", opts: ["She loved it", "She thought it was old-fashioned", "She refused completely", "She told her boss"], a: "She thought it was old-fashioned" },
  ]),

  R(57, 3, "Reading the small print", "The bank offered Minh a credit card with no annual fee for the first year. He signed quickly. Twelve months later, a fee of six hundred thousand dong appeared on his statement. He called to complain and the staff read him the sentence he had agreed to. It was there, on page four, in very small letters. Minh was annoyed with the bank, but he was more annoyed with himself. Now he reads the last page first, because that is where the cost usually hides.", [
    { q: "What was the offer?", opts: ["No annual fee for the first year", "No fee forever", "A free phone", "A lower interest rate"], a: "No annual fee for the first year" },
    { q: "Where was the fee explained?", opts: ["On the first page", "On page four in small letters", "Nowhere", "In an email"], a: "On page four in small letters" },
    { q: "Why does Minh now read the last page first?", opts: ["It is shorter", "The cost is usually hidden there", "It has the signature", "The bank told him to"], a: "The cost is usually hidden there" },
  ]),

  R(58, 3, "One sentence, one point", "A good work email is not a letter. Managers receive fifty a day and read them on a phone, between meetings. So put the request in the first line, not the last. Give the deadline as a date, not as “soon”. If you attach a file, say what it is. And before you press send, ask one question: if the reader only reads the subject line, do they still know what you want? If the answer is no, rewrite the subject line.", [
    { q: "Where should the request go?", opts: ["In the first line", "In the last line", "In the attachment", "In a second email"], a: "In the first line" },
    { q: "What is the main advice?", opts: ["Write long, polite emails", "Make the point clear immediately", "Never attach files", "Send fewer emails"], a: "Make the point clear immediately" },
    { q: "The test the writer suggests is about", opts: ["The attachment", "Whether the subject line alone communicates the request", "The greeting", "The signature"], a: "Whether the subject line alone communicates the request" },
  ]),

  R(59, 3, "The lost wallet", "Two years ago I lost my wallet on a bus in Da Lat. I had all my money in it, and I was two hundred kilometres from home. I sat at the station and did not know what to do. Then a woman I had never met paid for my ticket. She refused to give me her address. She only said, “Do the same for someone else.” I still remember her face. Since then I have twice helped a stranger, and both times I said exactly the same sentence.", [
    { q: "Where did the writer lose the wallet?", opts: ["On a bus in Da Lat", "At home", "At the station", "In a shop"], a: "On a bus in Da Lat" },
    { q: "What did the woman ask for in return?", opts: ["Money later", "Nothing except that he help someone else", "His address", "A phone number"], a: "Nothing except that he help someone else" },
    { q: "The story is mainly about", opts: ["The danger of buses", "Kindness that is passed on rather than repaid", "Losing money", "Life in Da Lat"], a: "Kindness that is passed on rather than repaid" },
  ]),

  R(60, 3, "The five-year question", "In interviews people are often asked where they want to be in five years. Most answers are polite and vague. A better question, one manager says, is smaller: what do you want to be true in twelve months that is not true today? That question can be answered honestly, and it can be checked. Five-year plans are useful for direction, but they change. Twelve-month goals are the ones that decide what you actually do on Monday morning.", [
    { q: "What question does the manager prefer?", opts: ["Where will you be in five years?", "What do you want to be true in twelve months?", "What is your salary?", "Why did you leave your last job?"], a: "What do you want to be true in twelve months?" },
    { q: "Why are five-year plans less useful?", opts: ["They are too short", "They are vague and they change", "Nobody asks them", "They are illegal"], a: "They are vague and they change" },
    { q: "“What you actually do on Monday morning” refers to", opts: ["Real, immediate action", "A meeting", "A holiday", "The weekend"], a: "Real, immediate action" },
  ]),

  /* ============ CẤP 4 — HOA (B1) ============ */

  R(61, 4, "The weakness question", "Interviewers ask about your greatest weakness knowing that most candidates will lie. The classic answer — “I work too hard” — is not a weakness; it is an advertisement, and everyone in the room knows it. A more effective response names a real limitation and then shows what you have done about it. Saying “I used to avoid difficult conversations, so I asked my manager for feedback every month, and now I schedule them first” demonstrates two things the job actually requires: self-awareness and the willingness to act. Honesty here is not a risk. Pretending to be flawless is.", [
    { q: "What is wrong with saying “I work too hard”?", opts: ["It is illegal", "It is an advertisement, not a real weakness", "It is too personal", "It is too honest"], a: "It is an advertisement, not a real weakness" },
    { q: "What does an effective answer demonstrate?", opts: ["Self-awareness and willingness to act", "Technical skill", "Long experience", "A high salary"], a: "Self-awareness and willingness to act" },
    { q: "The writer's final point is that", opts: ["Honesty is risky", "Appearing flawless is the greater risk", "You should not answer", "Interviews are pointless"], a: "Appearing flawless is the greater risk" },
  ]),

  R(62, 4, "The busy trap", "In many offices, being visibly busy has become a form of status. People reply to messages at midnight, attend meetings they do not need, and describe their workload as “crazy” with something close to pride. The trouble is that busyness and productivity are not the same thing, and they are often opposites. Deep work — the kind that produces something genuinely valuable — requires uninterrupted hours, which a full calendar makes impossible. The most effective colleagues are rarely the ones who look busiest. They are the ones who have protected their time and are willing to say no.", [
    { q: "How do some people treat their heavy workload?", opts: ["With shame", "With something close to pride", "With indifference", "With fear"], a: "With something close to pride" },
    { q: "What does deep work require?", opts: ["More meetings", "Uninterrupted hours", "A bigger team", "Late-night emails"], a: "Uninterrupted hours" },
    { q: "According to the writer, effective colleagues are those who", opts: ["Attend every meeting", "Protect their time and say no", "Reply fastest", "Work at midnight"], a: "Protect their time and say no" },
  ]),

  R(63, 4, "The meeting that should have been an email", "A meeting is expensive. Ten people for one hour is not one hour of cost; it is ten. Yet meetings are scheduled by habit, not by need. The test is simple: a meeting is justified only when a decision must be made and disagreement is likely. If the purpose is to share information, send the information. If the purpose is to update the manager, the manager can read. Some companies now require an agenda with a named decision before a meeting can be booked. Attendance falls sharply, and nothing important is lost.", [
    { q: "When is a meeting justified?", opts: ["When a decision must be made and disagreement is likely", "Every Monday", "When the manager wants an update", "When information must be shared"], a: "When a decision must be made and disagreement is likely" },
    { q: "What do some companies now require?", opts: ["Shorter meetings", "An agenda with a named decision", "Standing meetings", "Fewer employees"], a: "An agenda with a named decision" },
    { q: "“It is ten” refers to", opts: ["Ten meetings", "Ten person-hours of cost", "Ten decisions", "Ten minutes"], a: "Ten person-hours of cost" },
  ]),

  R(64, 4, "Do not read your slides", "The most common mistake in presentations is also the easiest to fix: the speaker reads the slide aloud while the audience reads it silently, faster. Two channels compete, and both lose. A slide should carry what words cannot — an image, a graph, a single number — while the speaker carries the argument. If your slides make sense without you, you are not needed; if you make sense without your slides, you are ready. Rehearse the first sixty seconds until you no longer need to think about them, because that is when the audience decides whether to listen.", [
    { q: "What is the most common mistake?", opts: ["Speaking too quietly", "Reading the slides aloud", "Using no slides", "Standing still"], a: "Reading the slides aloud" },
    { q: "What should a slide carry?", opts: ["The full argument", "What words cannot — an image, a graph, a number", "The speaker's notes", "A summary of everything"], a: "What words cannot — an image, a graph, a number" },
    { q: "Why rehearse the first sixty seconds?", opts: ["It is the hardest part to write", "The audience decides then whether to listen", "It is required", "The slides load slowly"], a: "The audience decides then whether to listen" },
  ]),

  R(65, 4, "The wrong major", "Every year, thousands of students choose a major based on what their parents consider secure, or on which examination score they happened to achieve. Three years later, many discover that they have been preparing carefully for a life they do not want. Changing course is expensive, and admitting the mistake feels like failure. But the real failure is continuing. A degree is four years; a career is forty. Universities that allow students to switch after the first year report better results, not worse — motivation, it turns out, is not a small factor.", [
    { q: "Why do many students choose the wrong major?", opts: ["Parental expectations or exam scores", "Poor teaching", "High tuition", "Lack of information"], a: "Parental expectations or exam scores" },
    { q: "What is the writer's main argument?", opts: ["Universities are too expensive", "Continuing in the wrong field is the real failure", "Students should not choose", "Exams should be abolished"], a: "Continuing in the wrong field is the real failure" },
    { q: "“A degree is four years; a career is forty” is used to show", opts: ["Degrees are short and unimportant", "The cost of switching is small compared to the cost of staying", "Careers are too long", "Students should study longer"], a: "The cost of switching is small compared to the cost of staying" },
  ]),

  R(66, 4, "The recycling gap", "Many cities claim high recycling rates, but the figures can be misleading. A bin may be labelled “recyclable” while its contents are contaminated with food waste, and contaminated batches are often sent to landfill anyway. Experts argue that the real problem starts earlier: too much packaging is produced in the first place. Reducing consumption is less visible than recycling, and far less popular, but it removes the waste before it is created. Recycling, they warn, should be the last step — not the first.", [
    { q: "Why can recycling figures be misleading?", opts: ["Bins are too small", "Contaminated batches still go to landfill", "People do not read labels", "Cities lie about population"], a: "Contaminated batches still go to landfill" },
    { q: "What do the experts say is the real problem?", opts: ["Too much packaging is produced", "Recycling bins are expensive", "Landfills are full", "People forget to sort waste"], a: "Too much packaging is produced" },
    { q: "The writer's attitude to recycling is best described as", opts: ["Enthusiastic", "Sceptical of it as a first solution", "Completely opposed", "Indifferent"], a: "Sceptical of it as a first solution" },
  ]),

  R(67, 4, "One and a half degrees", "The figure appears in every climate report, but it is widely misunderstood. One and a half degrees does not mean a slightly warmer afternoon. Average global temperature is an average: it hides the fact that some regions warm far faster, and that a small rise in the mean produces a large rise in the frequency of extremes. A heatwave that used to occur once in fifty years may arrive every five. The danger is not the average temperature we will live in; it is the extremes we will have to survive.", [
    { q: "What does a small rise in the average produce?", opts: ["A large rise in extreme events", "Slightly warmer afternoons", "Cooler winters", "No noticeable change"], a: "A large rise in extreme events" },
    { q: "What is the central misunderstanding?", opts: ["People confuse averages with the whole picture", "People think it is too cold", "Reports are unclear", "Scientists disagree"], a: "People confuse averages with the whole picture" },
    { q: "The last sentence implies that", opts: ["Averages matter more than extremes", "The real threat lies in extreme events, not mean warming", "We will adapt easily", "Fifty years is a long time"], a: "The real threat lies in extreme events, not mean warming" },
  ]),

  R(68, 4, "Who paid for this story?", "A headline is not a fact; it is a decision. Someone chose which of a thousand events to report, which word to use, and which detail to place first. This does not make journalism worthless — it makes it human. The useful question is not “is this source biased?” (all are) but “what would this source have to admit if it were wrong?” A publication that corrects its errors openly is more reliable than one that never seems to make any. Trust the process, not the promise.", [
    { q: "What does the writer say a headline is?", opts: ["A fact", "A decision", "An advertisement", "A summary"], a: "A decision" },
    { q: "Which question does the writer recommend?", opts: ["Is this source biased?", "What would this source admit if it were wrong?", "Who owns this newspaper?", "How old is the story?"], a: "What would this source admit if it were wrong?" },
    { q: "A publication that never corrects itself is", opts: ["More reliable", "Less reliable", "Neutral", "Unbiased"], a: "Less reliable" },
  ]),

  R(69, 4, "Why the sequel is worse", "Studios keep making sequels because the numbers say they should: a familiar title reduces risk, and risk is what a studio fears most. But the very thing that makes a sequel safe is what makes it weak. The first film had to earn your attention; the second assumes it. Characters who once surprised us are now required to behave as we expect them to. There are exceptions, and they follow one rule: the good sequel asks a new question rather than repeating the old answer.", [
    { q: "Why do studios make sequels?", opts: ["Directors prefer them", "A familiar title reduces risk", "They are cheaper to film", "Audiences demand them"], a: "A familiar title reduces risk" },
    { q: "What makes a good sequel, according to the writer?", opts: ["A bigger budget", "Asking a new question rather than repeating the old answer", "The same cast", "A longer running time"], a: "Asking a new question rather than repeating the old answer" },
    { q: "“The second assumes it” means the sequel", opts: ["Takes the audience's interest for granted", "Costs more money", "Has a new director", "Is shorter"], a: "Takes the audience's interest for granted" },
  ]),

  R(70, 4, "Finishing the book", "There is a rule many readers impose on themselves: once started, a book must be finished. It sounds like discipline, but it is closer to a trap. Every hour spent on a novel you dislike is an hour not spent on one you would have loved, and no amount of stubbornness turns a bad match into a good one. Some readers now give a book fifty pages. If it has not earned the next hour, it goes back on the shelf. Reading more begins with abandoning more.", [
    { q: "How many pages do some readers give a book?", opts: ["Ten", "Fifty", "One hundred", "The whole book"], a: "Fifty" },
    { q: "What is the writer's argument?", opts: ["Discipline is important", "Abandoning bad books lets you read more good ones", "Novels are too long", "Readers are lazy"], a: "Abandoning bad books lets you read more good ones" },
    { q: "The writer calls the rule “closer to a trap” because it", opts: ["Wastes time you could spend on better books", "Is difficult to follow", "Was invented by publishers", "Makes reading enjoyable"], a: "Wastes time you could spend on better books" },
  ]),

  R(71, 4, "The song you cannot escape", "Some melodies stay in the head for days. Researchers call them earworms, and they share certain features: a simple rhythm, a small unexpected leap in the melody, and — crucially — an unfinished quality. The brain dislikes incompleteness and keeps replaying the phrase, trying to resolve it. This is why songwriters sometimes end a chorus on an unstable note. It is also why the cure for an earworm is often to listen to the whole song once, properly. Finish it, and the mind lets it go.", [
    { q: "What is an “earworm”?", opts: ["A hearing illness", "A melody that repeats in your head", "A type of instrument", "A recording device"], a: "A melody that repeats in your head" },
    { q: "Why does the brain keep replaying the phrase?", opts: ["It enjoys it", "It dislikes incompleteness and tries to resolve it", "It is memorising the lyrics", "It is tired"], a: "It dislikes incompleteness and tries to resolve it" },
    { q: "The suggested cure is to", opts: ["Listen to a different song", "Listen to the whole song properly", "Sleep", "Sing it louder"], a: "Listen to the whole song properly" },
  ]),

  R(72, 4, "Standing too close", "In a gallery, most visitors spend about eight seconds in front of each painting — long enough to read the label, take a photograph, and move on. The label is the problem. It tells you the artist, the date, and often the meaning, and once you have read it, you stop looking. An old exercise reverses the order: choose one work, look at it for five minutes without reading anything, and only then turn to the label. Most people report that they saw something the label never mentioned.", [
    { q: "How long do most visitors look at a painting?", opts: ["Eight seconds", "Five minutes", "One minute", "Half an hour"], a: "Eight seconds" },
    { q: "Why is the label a problem?", opts: ["It is badly written", "Once read, people stop looking", "It is too small", "It is often wrong"], a: "Once read, people stop looking" },
    { q: "The exercise suggests that looking first", opts: ["Wastes time", "Reveals things the label does not mention", "Is only for experts", "Should replace labels entirely"], a: "Reveals things the label does not mention" },
  ]),

  R(73, 4, "Authentic, whatever that means", "Travellers hunt for “authentic” food, but the word hides an assumption: that a cuisine has a fixed, original form which change corrupts. It does not. The chilli is South American and reached Vietnam by ship. The baguette in banh mi arrived with the French. Pho itself is barely more than a century old. What we call tradition is simply borrowing that has been going on long enough to be forgotten. A living cuisine is not a museum, and the dishes we defend as ancient were, at some point, somebody's innovation.", [
    { q: "Where did the chilli originally come from?", opts: ["Vietnam", "France", "South America", "China"], a: "South America" },
    { q: "What is the writer's central claim?", opts: ["Tradition is borrowing that has been forgotten", "Foreign food is better", "Pho is not Vietnamese", "Authenticity is important"], a: "Tradition is borrowing that has been forgotten" },
    { q: "“A living cuisine is not a museum” means it", opts: ["Should not change", "Naturally keeps changing", "Is not worth studying", "Is badly preserved"], a: "Naturally keeps changing" },
  ]),

  R(74, 4, "The village that makes one thing", "Along the Red River there are villages that have made the same object for four hundred years: paper in one, silk in another, bronze in a third. The skill passes from parent to child, and outsiders rarely learn it. This concentration produced extraordinary quality, but it also produced fragility. When a young generation leaves for the factories, the craft does not shrink gradually; it can disappear within a single lifetime. Several villages now teach the craft in schools — not to preserve a product, but to preserve the possibility of making it.", [
    { q: "How was the skill traditionally passed on?", opts: ["Through schools", "From parent to child", "By foreign teachers", "Through books"], a: "From parent to child" },
    { q: "Why is the craft fragile?", opts: ["The materials are rare", "It can vanish in one generation if the young leave", "It is illegal", "It is too expensive"], a: "It can vanish in one generation if the young leave" },
    { q: "The schools teach the craft in order to preserve", opts: ["The product", "The possibility of making it", "The village population", "Tourism income"], a: "The possibility of making it" },
  ]),

  R(75, 4, "The friendship that faded", "Nobody ended it. There was no argument, no betrayal — just a reply that came a day later, then a week, then not at all. Most friendships do not break; they simply lose the small maintenance that kept them alive. Researchers who study adult friendship find that proximity does most of the work, and when proximity disappears, effort has to replace it. The uncomfortable conclusion is that a friendship which survives distance is not luckier than one that does not. It is usually just more deliberate.", [
    { q: "How do most friendships end, according to the text?", opts: ["Through an argument", "Gradually, without any event", "Through betrayal", "By agreement"], a: "Gradually, without any event" },
    { q: "What normally does most of the work in a friendship?", opts: ["Proximity", "Money", "Shared hobbies", "Social media"], a: "Proximity" },
    { q: "The “uncomfortable conclusion” is that lasting friendships are", opts: ["A matter of luck", "The result of deliberate effort", "Rare and impossible", "Based on childhood"], a: "The result of deliberate effort" },
  ]),

  R(76, 4, "The confident and the competent", "In groups, we tend to follow whoever speaks first and most confidently, and we assume that confidence signals competence. Studies find only a weak link between the two. Worse, the least skilled are often the most certain, because judging your own skill requires the very knowledge you lack. This is not a reason to distrust confident people; it is a reason to ask them for their reasoning. A competent person can explain how they might be wrong. Someone who cannot describe what would change their mind has not really thought.", [
    { q: "What do people wrongly assume?", opts: ["That confidence signals competence", "That silence signals wisdom", "That experts are always right", "That groups make good decisions"], a: "That confidence signals competence" },
    { q: "Why are the least skilled often the most certain?", opts: ["They are dishonest", "Judging your skill requires the knowledge you lack", "They practise more", "They are naturally bold"], a: "Judging your skill requires the knowledge you lack" },
    { q: "The writer's practical test is to ask a person", opts: ["How confident they feel", "What would change their mind", "How long they have worked", "Who agrees with them"], a: "What would change their mind" },
  ]),

  R(77, 4, "Two minutes", "People often fail to build habits because they aim too high. Someone who has never exercised promises to run an hour a day, then quits within a week. A more reliable approach is to shrink the habit until it is almost embarrassingly small: two minutes of running, one page of reading, one sentence of writing. The point is not the two minutes; it is that showing up becomes automatic. Once the habit exists, making it bigger is easy. Making it exist at all is the hard part.", [
    { q: "Why do people fail to build habits?", opts: ["They are lazy", "They set the target too high", "They have no time", "They dislike exercise"], a: "They set the target too high" },
    { q: "What is the purpose of the “two minutes”?", opts: ["To burn calories", "To make showing up automatic", "To save time", "To impress others"], a: "To make showing up automatic" },
    { q: "According to the text, the hardest part is", opts: ["Increasing the habit", "Making the habit exist at all", "Finding a coach", "Buying equipment"], a: "Making the habit exist at all" },
  ]),

  R(78, 4, "The debt you cannot repay", "Sleep is often treated as a flexible resource: borrow four hours tonight, return them at the weekend. The metabolism does not accept these terms. A single short night measurably reduces attention, mood and judgement, and although a long weekend lie-in restores the feeling of rest, it does not restore all the measured damage. The most dangerous part is that the tired brain is bad at noticing that it is tired. People who have slept five hours for a week rate their own performance as normal. It is not.", [
    { q: "What does a single short night reduce?", opts: ["Attention, mood and judgement", "Height and weight", "Appetite only", "Nothing measurable"], a: "Attention, mood and judgement" },
    { q: "What is the most dangerous aspect of sleep loss?", opts: ["It causes illness immediately", "The tired brain cannot notice its own impairment", "It is expensive", "It is permanent"], a: "The tired brain cannot notice its own impairment" },
    { q: "The “debt” metaphor is used to show that", opts: ["Sleep can be borrowed and fully repaid", "Lost sleep is not fully recoverable", "Sleep costs money", "Weekends are important"], a: "Lost sleep is not fully recoverable" },
  ]),

  R(79, 4, "Sensors are not a strategy", "When a city announces that it has become “smart”, it usually means it has installed sensors. Traffic lights now count cars; bins report when they are full. The data is real, and some of it is useful. But a sensor measures; it does not decide. A city that collects a million data points and still cannot say who is responsible for acting on them has bought instruments, not intelligence. The hardest part of a smart city was never the technology. It was the institution that has to use it.", [
    { q: "What does “smart” usually mean in practice?", opts: ["Installing sensors", "Better schools", "Cheaper housing", "Fewer cars"], a: "Installing sensors" },
    { q: "What is the writer's main criticism?", opts: ["Sensors are too expensive", "Data is useless without institutions that act on it", "Cities are too big", "Technology is unreliable"], a: "Data is useless without institutions that act on it" },
    { q: "“Instruments, not intelligence” suggests the city has", opts: ["Tools but no capacity to use them", "Intelligent staff", "Broken equipment", "Too little data"], a: "Tools but no capacity to use them" },
  ]),

  R(80, 4, "Wider roads, more cars", "When a city widens a road to reduce congestion, traffic usually improves for a few months — then returns to exactly what it was. Transport researchers call this induced demand: the extra capacity makes driving more attractive, so more people drive. Cities that have reduced congestion durably did the opposite. They made driving slightly less convenient and public transport slightly more so. The lesson is uncomfortable: you cannot build your way out of traffic, because the road itself creates the cars that fill it.", [
    { q: "What is “induced demand”?", opts: ["Extra capacity attracts more drivers", "Demand for wider roads", "A tax on drivers", "A type of public transport"], a: "Extra capacity attracts more drivers" },
    { q: "What did successful cities do?", opts: ["Built more roads", "Made driving less convenient, transit more so", "Banned all cars", "Raised fuel prices only"], a: "Made driving less convenient, transit more so" },
    { q: "The phrase “you cannot build your way out of traffic” means", opts: ["Construction is illegal", "Building more roads will not solve congestion", "Roads are too expensive", "Traffic is unimportant"], a: "Building more roads will not solve congestion" },
  ]),

  /* ============ CẤP 5 — QUẢ (B2) ============ */

  R(81, 5, "The tax nobody voted for", "Inflation is sometimes described as a tax, and the comparison is more exact than it first appears. Like a tax, it transfers purchasing power away from those who hold cash; unlike a tax, it is never debated, never legislated, and falls hardest on those least able to protect themselves. A household with savings in a bank account loses quietly. A household with debt at a fixed rate quietly gains. Central banks raise interest rates to reverse this, but the instrument is blunt: it cools the whole economy in order to cool one part of it, and the unemployment it creates is not distributed evenly either.", [
    { q: "Who quietly gains during inflation?", opts: ["Savers with cash", "Households with fixed-rate debt", "Retired people", "Central banks"], a: "Households with fixed-rate debt" },
    { q: "Why does the writer call the interest-rate tool “blunt”?", opts: ["It works too slowly", "It cools the whole economy to cool one part", "It is illegal", "It is too popular"], a: "It cools the whole economy to cool one part" },
    { q: "The comparison with a tax is imperfect because inflation", opts: ["Raises revenue", "Is never debated or legislated", "Is voluntary", "Applies only to the rich"], a: "Is never debated or legislated" },
  ]),

  R(82, 5, "Failure is not the risk", "Founders are routinely told that failure is the great danger of a startup. It is not. The far more common outcome is the company that neither dies nor succeeds: it survives, pays salaries, grows six per cent a year, and consumes a decade of its founders' lives without ever becoming what it promised. Investors have a word for this, and it is not a kind one. A business that fails quickly returns its people, its capital and its lessons to the market. A business that limps forward returns nothing at all. Knowing when to stop is a skill, and almost nobody is taught it.", [
    { q: "What outcome does the writer consider worse than failure?", opts: ["Bankruptcy", "A company that survives without succeeding", "Rapid growth", "Being acquired"], a: "A company that survives without succeeding" },
    { q: "What does a quick failure return to the market?", opts: ["Nothing", "People, capital and lessons", "Only money", "Only reputation"], a: "People, capital and lessons" },
    { q: "The final sentence implies that stopping is", opts: ["A sign of weakness", "A genuine competence that is rarely taught", "Always premature", "Financially irrelevant"], a: "A genuine competence that is rarely taught" },
  ]),

  R(83, 5, "The confidence problem", "The most persistent weakness of large language models is not that they are wrong — humans are wrong constantly — but that they are wrong with the same fluency they display when they are right. A model that hedged whenever it was uncertain would be far easier to work with, yet fluency is precisely what training rewards. The result is an asymmetry: the cost of a confident error falls on the user, while the benefit of confident prose accrues to the system's perceived quality. Until evaluation penalises unwarranted certainty as heavily as it penalises hesitation, the incentive will not change.", [
    { q: "What does the writer identify as the key weakness?", opts: ["Models are frequently wrong", "Models are wrong with the same fluency as when right", "Models are too slow", "Models hedge too much"], a: "Models are wrong with the same fluency as when right" },
    { q: "Who bears the cost of a confident error?", opts: ["The developer", "The user", "The evaluator", "Nobody"], a: "The user" },
    { q: "What change does the writer call for?", opts: ["Faster models", "Evaluation that penalises unwarranted certainty", "More training data", "Banning hedging"], a: "Evaluation that penalises unwarranted certainty" },
  ]),

  R(84, 5, "Consent you did not give", "Clicking “I agree” is treated in law as consent, but the fiction is transparent. The average person would need weeks each year to read the terms they accept, and the terms are drafted by the party that benefits from them. Worse, the most consequential data is often inferred rather than collected: you never disclosed your income, but your purchase history predicts it. Regulation that focuses on consent therefore protects the wrong thing. What matters is not whether you agreed to the collection, but what may lawfully be done with the inference.", [
    { q: "Why is “I agree” described as a fiction?", opts: ["The terms are unreadable in practice and drafted by the beneficiary", "The button does not work", "It is not legally binding", "Users are dishonest"], a: "The terms are unreadable in practice and drafted by the beneficiary" },
    { q: "What is the writer's central argument?", opts: ["Consent-based regulation protects the wrong thing", "Data collection should be banned", "Users should read terms", "Income should be private"], a: "Consent-based regulation protects the wrong thing" },
    { q: "The income example illustrates that data can be", opts: ["Encrypted", "Inferred without ever being disclosed", "Sold cheaply", "Deleted on request"], a: "Inferred without ever being disclosed" },
  ]),

  R(85, 5, "The trial that failed well", "A clinical trial that finds no effect is often called a failure, and its results are frequently never published. This is a serious distortion. If ten teams test the same compound and only the one that found a positive result publishes, the literature will report a treatment that works when the evidence says otherwise. The problem is not fraud; it is selection. Journals prefer positive findings, and careers are built on them. Pre-registration — declaring the hypothesis before the data is collected — was introduced precisely to make a null result publishable, and therefore honest.", [
    { q: "What happens when only positive results are published?", opts: ["The literature overstates the treatment's effect", "Trials become cheaper", "Fraud increases", "Nothing changes"], a: "The literature overstates the treatment's effect" },
    { q: "What does the writer say the underlying problem is?", opts: ["Fraud", "Selection", "Poor statistics", "Small samples"], a: "Selection" },
    { q: "The purpose of pre-registration is to", opts: ["Speed up trials", "Make a null result publishable", "Protect patents", "Reduce costs"], a: "Make a null result publishable" },
  ]),

  R(86, 5, "The cost of leaving", "Almost the entire difficulty of spaceflight is contained in the first few minutes. To reach orbit, a vehicle must not merely rise; it must accelerate sideways to roughly twenty-eight thousand kilometres an hour, or it will simply fall back. Nearly all the fuel is spent fighting gravity while carrying the fuel that has not yet been burned — a problem that compounds against itself. This is why reusability changed the economics so sharply. The rocket was never the expensive part; throwing it away was.", [
    { q: "What must a vehicle do to reach orbit?", opts: ["Rise vertically", "Accelerate sideways to enormous speed", "Escape the atmosphere only", "Reduce its mass"], a: "Accelerate sideways to enormous speed" },
    { q: "Why does the fuel problem “compound against itself”?", opts: ["Fuel must be carried to lift fuel not yet burned", "Fuel is scarce", "Fuel is heavy on the ground", "Engines are inefficient"], a: "Fuel must be carried to lift fuel not yet burned" },
    { q: "The final sentence argues that the true cost was", opts: ["Building the rocket", "Discarding the rocket after one flight", "The fuel", "The crew"], a: "Discarding the rocket after one flight" },
  ]),

  R(87, 5, "The problem is not the sun", "Solar panels have become remarkably cheap; the sun has never sent an invoice. The obstacle is that electricity must be consumed at the instant it is generated, and the sun does not consult the demand curve. It shines hardest at midday and stops entirely in the evening, precisely when households switch everything on. A grid built on renewables is therefore not primarily a generation problem but a storage and transmission problem — and those are far less photogenic. Governments cut ribbons in front of solar farms. Nobody holds a ceremony for a battery.", [
    { q: "When does household demand typically peak?", opts: ["At midday", "In the evening", "At dawn", "At night"], a: "In the evening" },
    { q: "What does the writer identify as the real obstacle?", opts: ["The cost of panels", "Storage and transmission", "Lack of sunlight", "Public opposition"], a: "Storage and transmission" },
    { q: "The last two sentences are used to suggest that", opts: ["Politics rewards the visible over the necessary", "Batteries are unimportant", "Solar farms are useless", "Ceremonies are expensive"], a: "Politics rewards the visible over the necessary" },
  ]),

  R(88, 5, "The policy that worked on paper", "Every policy is designed for the behaviour its authors expect, and then meets the behaviour people actually have. A subsidy intended to help small farmers is captured by the intermediaries who process the paperwork. A rule requiring three competing quotations produces three quotations from firms that are quietly related. None of this proves that regulation is futile; it proves that regulation without an enforcement mechanism is merely a suggestion. The decisive question in policy design is not what the rule requires, but what happens to the person who ignores it.", [
    { q: "What happens to the farming subsidy in the example?", opts: ["It is cancelled", "It is captured by intermediaries", "It doubles in value", "It reaches the farmers"], a: "It is captured by intermediaries" },
    { q: "What is the writer's central claim?", opts: ["Regulation is futile", "A rule without enforcement is only a suggestion", "Subsidies should be abolished", "Paperwork should be reduced"], a: "A rule without enforcement is only a suggestion" },
    { q: "The example of three related firms illustrates", opts: ["Healthy competition", "Formal compliance that defeats the rule's purpose", "Fraud by officials", "A drafting error"], a: "Formal compliance that defeats the rule's purpose" },
  ]),

  R(89, 5, "Beyond reasonable doubt", "The criminal standard of proof is deliberately asymmetric. It does not ask which account is more likely; it asks whether any reasonable doubt remains. This will inevitably acquit some who are guilty, and the system accepts that cost knowingly, on the principle that a wrongful conviction is the graver injustice. Civil disputes apply a lower standard — the balance of probabilities — because the stakes are compensation, not liberty. Critics who complain that a court “let a guilty man go” are often objecting not to an error but to the design.", [
    { q: "What does the criminal standard ask?", opts: ["Which account is more likely", "Whether any reasonable doubt remains", "Who has better lawyers", "What the public believes"], a: "Whether any reasonable doubt remains" },
    { q: "Why is the standard lower in civil cases?", opts: ["The stakes are compensation, not liberty", "Civil courts are faster", "There is less evidence", "Judges are different"], a: "The stakes are compensation, not liberty" },
    { q: "The final sentence suggests that such critics are objecting to", opts: ["A mistake by the court", "The deliberate design of the system", "Corrupt judges", "Weak evidence"], a: "The deliberate design of the system" },
  ]),

  R(90, 5, "The lowest price is not the cheapest", "Procurement law in many countries requires the contracting party to consider the lowest evaluated price, not simply the lowest offer. The distinction matters. A bidder who wins by underpricing the work has every incentive to recover the margin later — through variation orders, disputed specifications, or delay claims. The evaluation criteria therefore exist to filter for capability, not only for cost: turnover thresholds, similar contracts, and technical compliance are all attempts to answer one question — can this bidder actually deliver? A tender that ignores that question buys a cheap contract and an expensive project.", [
